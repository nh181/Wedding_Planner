// Global event delegator - handles all dynamic button clicks robustly
document.body.addEventListener('click',async function(e){
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const action=btn.dataset.action;
  const id=parseInt(btn.dataset.id);
  if(action==='cal'){
    const t=tasks.find(x=>x.id===id);if(!t||!t.due)return;
    const[y,m,d]=t.due.split('-');
    const ics=['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
      `DTSTART;VALUE=DATE:${y}${m}${d}`,
      `DTEND;VALUE=DATE:${y}${m}${d}`,
      `SUMMARY:💍 ${t.title}`,
      `DESCRIPTION:${t.cat}${t.assignees&&t.assignees.length?' - '+t.assignees.join(', '):''}`,
      'END:VEVENT','END:VCALENDAR'].join('\r\n');
    const url=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));
    const a2=document.createElement('a');
    a2.href=url;a2.download=t.title.replace(/[^a-z0-9]/gi,'_')+'.ics';
    a2.click();URL.revokeObjectURL(url);
  } else if(action==='restore'){
    const t=tasks.find(x=>x.id===id);if(!t)return;
    delete t.trashed;delete t.trashedAt;
    await save();render();
  } else if(action==='delete-final'){
    if(!confirm('Endgültig löschen? Kann nicht rückgängig gemacht werden.'))return;
    tasks=tasks.filter(x=>x.id!==id);
    await save();render();
  } else if(action==='empty-trash'){
    if(!confirm('Alle Aufgaben im Papierkorb endgültig löschen?'))return;
    tasks=tasks.filter(x=>!x.trashed);
    await save();render();
  } else if(action==='empty-vendor-trash'){
    if(!confirm('Alle Anbieter im Papierkorb endgültig löschen?'))return;
    vendors=vendors.filter(x=>!x.trashed);
    await save();renderAnbieter();
  } else if(action==='open-task'){
    const t=tasks.find(x=>x.id===id);if(t)openTaskPopup(t);
  } else if(action==='tog-task'){
    e.stopPropagation();
    const t=tasks.find(x=>x.id===id);
    if(!t)return;
    const canChk=role==='admin'||(t.assignees&&t.assignees.includes(firstName));
    if(!canChk)return;
    t.done=!t.done;await save();render();
  } else if(action==='add-vendor'){
    window.openVendorModal();
  } else if(action==='csv-dl'){
    window.downloadCSVTemplate();
  } else if(action==='csv-import'){
    document.getElementById('csv-file-input').click();
  } else if(action==='vopen'){
    const vid=parseInt(btn.dataset.vid);
    const v=vendors.find(x=>x.id===vid);
    if(v?.website)window.open(v.website.startsWith('http')?v.website:'https://'+v.website,'_blank');
  } else if(action==='vedit'){
    const vid=parseInt(btn.dataset.vid);
    openVendorPopup(vid);
  } else if(action==='vdelete'){
    const vid=parseInt(btn.dataset.vid);
    if(!confirm('Anbieter löschen?'))return;
    vendors=vendors.filter(v=>v.id!==vid);
    await save();renderAnbieter();
  } else if(action==='vstar'){
    const vid=parseInt(btn.dataset.vid);
    const star=parseInt(btn.dataset.star);
    const v=vendors.find(x=>x.id===vid);
    if(!v)return;
    v.rating=star;
    await save();renderAnbieter();
  } else if(action==='vfilter'){
    vFilter=btn.dataset.cat;renderAnbieter();
  } else if(action==='vview'){
    vView=btn.dataset.view;renderAnbieter();
  }
});



function renderBudget(){
  const a=document.getElementById('scroll');
  const CAT_ICONS={Location:'🏰',Catering:'🍽️',Dekoration:'💐',Musik:'🎵',Fotografie:'📸',Kleidung:'👗',Einladungen:'💌',Flitterwochen:'✈️',Sonstiges:'📦'};
  const totalAct=tasks.filter(t=>!t.trashed).reduce((s,t)=>s+(t.costActual||0),0);
  const totalPlan=CATS.reduce((s,cat)=>s+(catBudget[cat]||0),0);
  const budget=totalBudget||0;
  /* — KPI color logic — */
  const istPct=budget?Math.round(totalAct/budget*100):0;
  const istCls=istPct>=100?'over':istPct>=80?'amber':'ok';
  const planPct=budget?Math.round(totalPlan/budget*100):0;
  const planCls=planPct>=100?'over':planPct>=80?'amber':'ok';
  const restIst=budget-totalAct;
  const restPlan=budget-totalPlan;
  let h='';
  /* ── 1) KPI-Karten ── */
  h+=`<div class="b-kpis">
    <div class="b-kpi"><div class="b-kpi-val neutral">${eur(budget)}</div><div class="b-kpi-lbl">Gesamtbudget</div></div>
    <div class="b-kpi"><div class="b-kpi-val amber">${eur(totalPlan)}</div><div class="b-kpi-lbl">Geplant</div></div>
    <div class="b-kpi"><div class="b-kpi-val ${istCls}">${eur(totalAct)}</div><div class="b-kpi-lbl">Ist-Kosten</div></div>
  </div>`;
  /* ── 1b) Kategorie-Verteilung (Toggle) ── */
  const distChecked=window._budgetDistOpen?'checked':'';
  h+=`<div class="b-dist-toggle">
    <label>📊 Verteilung nach Kategorie</label>
    <label class="b-dist-switch"><input type="checkbox" ${distChecked} onchange="window._budgetDistOpen=this.checked;renderBudget()"/><span class="b-dist-slider"></span></label>
  </div>`;
  if(window._budgetDistOpen){
    const STACK_COLORS={Location:'#FF6B6B',Catering:'#4ECDC4',Dekoration:'#45B7D1',Musik:'#96CEB4',Fotografie:'#FFEAA7',Kleidung:'#DDA0DD',Einladungen:'#98D8C8',Flitterwochen:'#F7DC6F',Sonstiges:'#ADB5BD'};
    const catData=CATS.map(cat=>({cat,plan:catBudget[cat]||0,act:tasks.filter(t=>t.cat===cat&&!t.trashed).reduce((s,t)=>s+(t.costActual||0),0),color:STACK_COLORS[cat],ico:CAT_ICONS[cat]||'📁'}));
    /* Gemeinsamer Maximalwert: Budget, Plan-Summe oder Ist-Summe – je nachdem was am größten ist */
    const barMax=Math.max(budget,totalPlan,totalAct)||1;
    /* Plan-Balken: Segmente relativ zu barMax */
    let planSegs='';
    if(totalPlan>0) catData.forEach(d=>{if(d.plan>0){const w=(d.plan/barMax*100).toFixed(1);planSegs+=`<div class="b-stack-seg" style="width:${w}%;background:${d.color}" title="${d.cat}: ${eur(d.plan)}"></div>`;}});
    /* Ist-Balken: Segmente relativ zu barMax */
    let istSegs='';
    if(totalAct>0) catData.forEach(d=>{if(d.act>0){const w=(d.act/barMax*100).toFixed(1);istSegs+=`<div class="b-stack-seg" style="width:${w}%;background:${d.color}" title="${d.cat}: ${eur(d.act)}"></div>`;}});
    /* Legende: nur Kategorien mit Plan oder Ist > 0 */
    const legendItems=catData.filter(d=>d.plan>0||d.act>0).map(d=>`<div class="b-stack-leg-item"><span class="b-stack-leg-dot" style="background:${d.color}"></span>${d.ico} ${d.cat}<span class="leg-val">${eur(d.plan)} / ${eur(d.act)}</span></div>`).join('');
    const refPct=budget>0?(budget/barMax*100).toFixed(1):0;
    const showRef=budget>0&&budget<barMax;
    const refLine=showRef?`<div class="b-stack-ref" style="left:${refPct}%" data-label="Budget ${eur(budget)}"></div>`:'';
    h+=`<div class="b-stack-wrap">
      <div class="b-stack-label"><span>Geplant</span><span>${eur(totalPlan)}</span></div>
      <div class="b-stack-bar-wrap"><div class="b-stack-bar">${planSegs||'<div style="width:100%;height:100%;background:var(--br);border-radius:10px"></div>'}</div>${refLine}</div>
      <div class="b-stack-label"><span>Ist-Kosten</span><span>${eur(totalAct)}</span></div>
      <div class="b-stack-bar-wrap"><div class="b-stack-bar">${istSegs||'<div style="width:100%;height:100%;background:var(--br);border-radius:10px"></div>'}</div>${refLine}</div>
      <div class="b-stack-legend">${legendItems||'<span style="font-size:12px;color:var(--t3)">Noch keine Kosten eingetragen</span>'}</div>
    </div>`;
  }
  /* ── 2) Fortschrittsbalken ── */
  h+=`<div class="b-card">
    <div class="b-prog">
      <div class="b-prog-head">
        <span class="b-prog-title">Budget vs. Ist</span>
        <span class="b-prog-nums">${eur(totalAct)} / ${eur(budget)}</span>
      </div>
      <div class="b-prog-bar"><div class="b-prog-fill ${istCls}" style="width:${Math.min(istPct,100)}%"></div></div>
      <div class="b-prog-rest ${restIst<0?'over':''}">${restIst>=0?'Noch '+eur(restIst)+' verfügbar':''+eur(Math.abs(restIst))+' über Budget!'}</div>
    </div>
    <div class="b-prog">
      <div class="b-prog-head">
        <span class="b-prog-title">Budget vs. Plan</span>
        <span class="b-prog-nums">${eur(totalPlan)} / ${eur(budget)}</span>
      </div>
      <div class="b-prog-bar"><div class="b-prog-fill ${planCls}" style="width:${Math.min(planPct,100)}%"></div></div>
      <div class="b-prog-rest ${restPlan<0?'over':''}">${restPlan>=0?'Puffer: '+eur(restPlan):''+eur(Math.abs(restPlan))+' überplant!'}</div>
    </div>
  </div>`;
  /* ── 3) Gesamtbudget-Eingabe ── */
  h+=`<div class="b-budget-input">
    <label>Gesamtbudget</label>
    <div class="b-inp-wrap">
      <input type="number" class="sinp" value="${budget||''}" placeholder="z.B. 15000" style="width:110px" onchange="setBudget(this.value)"/>
      <span style="font-size:13px;color:var(--t3)">€</span>
    </div>
  </div>`;
  /* ── 4) Kategorie-Kacheln ── */
  h+=`<div class="b-cat-grid">`;
  CATS.forEach(cat=>{
    const plan=catBudget[cat]||0;
    const act=tasks.filter(t=>t.cat===cat&&!t.trashed).reduce((s,t)=>s+(t.costActual||0),0);
    const base=plan||budget||1;
    const pct=plan>0?Math.round(act/plan*100):(act>0?100:0);
    const cls=pct>=100?'over':pct>=70?'amber':'ok';
    const diff=plan-act;
    const ico=CAT_ICONS[cat]||'📁';
    h+=`<div class="b-tile">
      <div class="b-tile-head"><span class="b-tile-ico">${ico}</span><span class="b-tile-name">${cat}</span></div>
      <div class="b-tile-vals">
        <span class="plan">Plan ${eur(plan)}</span>
        <span class="ist ${act>plan&&plan>0?'over':''}">${eur(act)}</span>
      </div>
      <div class="b-tile-bar"><div class="b-tile-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="b-tile-meta">
        <span>${pct}%</span>
        <span class="${diff<0?'over':''}">${diff>=0?'Rest '+eur(diff):'+'+eur(Math.abs(diff))}</span>
      </div>
      <div class="b-tile-inp">
        <label>Plan:</label>
        <input type="number" placeholder="0" value="${plan||''}" onchange="setCatBudget('${cat}',this.value)"/>
        <span>€</span>
      </div>
    </div>`;
  });
  h+=`</div>`;
  /* ── 5) Letzte Buchungen (aufklappbar) ── */
  if(budgetHistory&&budgetHistory.length){
    const bhIcons={Location:'🏰',Catering:'🍽️',Dekoration:'💐',Musik:'🎵',Fotografie:'📸',Kleidung:'👗',Einladungen:'💌',Flitterwochen:'✈️',Sonstiges:'📦'};
    const last10=budgetHistory.slice(-10).reverse();
    let bhEntries='';
    last10.forEach(e=>{
      const d=new Date(e.date);
      const ds=d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
      const diff=e.newCost-e.oldCost;
      const cls=diff>=0?'green':'red';
      const sign=diff>=0?'+':'';
      bhEntries+=`<div class="bh-entry"><span class="bh-date">${ds}</span><span class="bh-ico">${bhIcons[e.cat]||'📁'}</span><span class="bh-title">${e.title}</span><span class="bh-amount ${cls}">${sign}${eur(diff)}</span></div>`;
    });
    h+=`<div class="bh-card" id="bh-dropdown">
      <div class="bh-header" onclick="document.getElementById('bh-dropdown').classList.toggle('open')">
        <h3>📒 Letzte Buchungen (${last10.length})</h3>
        <span class="bh-chevron">▼</span>
      </div>
      <div class="bh-body"><div class="bh-body-inner">${bhEntries}</div></div>
    </div>`;
  }
  a.innerHTML=h;
}

/* ── BACKUP: JSON Export ── */
window._exportBackup=async function(){
  try{
    /* Hochzeitsinfos laden */
    let info={};
    try{const s=await getDoc(ID);if(s.exists())info=s.data();}catch(e){}
    /* Budget-Daten laden */
    let budgetData={};
    try{const bs=await getDoc(BD);if(bs.exists())budgetData=bs.data();}catch(e){}
    const backup={
      _meta:{version:1,app:'Hochzeitsplaner Luisa & Nico',exportDate:new Date().toISOString(),taskCount:tasks.length,vendorCount:vendors.length},
      tasks:tasks,
      vendors:vendors,
      weddingDate:wDate,
      templates:tmpls,
      budgetHistory:budgetHistory||[],
      vendorCriteria:vendorCriteria,
      budget:{total:totalBudget,catBudget:catBudget},
      info:info
    };
    const json=JSON.stringify(backup,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date();
    const dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    a.href=url;
    a.download='hochzeit_backup_'+dateStr+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert('✅ Backup erstellt!\n\nDatei: hochzeit_backup_'+dateStr+'.json\n\nAufgaben: '+tasks.length+'\nAnbieter: '+vendors.length);
  }catch(e){alert('❌ Fehler beim Export: '+e.message);}
};

/* ── BACKUP: JSON Import ── */
window._importBackup=async function(input){
  const file=input.files[0];
  if(!file)return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    /* Validierung */
    if(!data._meta||!data._meta.app){alert('❌ Ungültige Backup-Datei.');input.value='';return;}
    /* Vorschau */
    const meta=data._meta;
    const preview='📋 Backup vom: '+(new Date(meta.exportDate)).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})+
      '\n\n📝 Aufgaben: '+(data.tasks||[]).length+
      '\n🏪 Anbieter: '+(data.vendors||[]).length+
      '\n💶 Budget: '+((data.budget?.total||0).toLocaleString('de-DE'))+' €'+
      '\n📅 Hochzeitsdatum: '+(data.weddingDate||'–')+
      '\n📊 Budget-History: '+(data.budgetHistory||[]).length+' Einträge'+
      '\n\n⚠️ ACHTUNG: Alle aktuellen Daten werden überschrieben!\n\nWirklich wiederherstellen?';
    if(!confirm(preview)){input.value='';return;}
    /* Daten wiederherstellen */
    tasks=data.tasks||[];
    vendors=data.vendors||[];
    wDate=data.weddingDate||'';
    tmpls=data.templates||[];
    budgetHistory=data.budgetHistory||[];
    vendorCriteria=data.vendorCriteria||vendorCriteria;
    nid=tasks.reduce((m,t)=>Math.max(m,t.id||0),0)+1;
    vnid=vendors.reduce((m,v)=>Math.max(m,v.id||0),0)+1;
    await save();
    /* Budget separat speichern */
    if(data.budget){
      totalBudget=data.budget.total||0;
      catBudget=data.budget.catBudget||{};
      try{await setDoc(BD,{total:totalBudget,catBudget:catBudget});}catch(e){}
    }
    /* Info separat speichern */
    if(data.info&&Object.keys(data.info).length){
      try{await setDoc(ID,data.info);}catch(e){}
    }
    input.value='';
    render();
    alert('✅ Backup erfolgreich wiederhergestellt!\n\n'+tasks.length+' Aufgaben\n'+vendors.length+' Anbieter');
  }catch(e){alert('❌ Fehler beim Import: '+e.message);input.value='';}
};

/* ── BACKUP: Excel Export ── */
window._exportExcel=async function(){
  try{
    if(typeof XLSX==='undefined'){alert('❌ Excel-Bibliothek wird geladen, bitte nochmal versuchen.');return;}
    const wb=XLSX.utils.book_new();

    /* --- Blatt 1: Aufgaben --- */
    const taskRows=tasks.filter(t=>!t.trashed).map(t=>{
      const v=t.vendorId?vendors.find(x=>x.id===t.vendorId):null;
      const subDone=(t.subtasks||[]).filter(s=>s.done).length;
      const subTotal=(t.subtasks||[]).length;
      return {
        'Aufgabe':t.title,
        'Kategorie':t.cat||'',
        'Priorität':t.prio==='hoch'?'Hoch':t.prio==='mittel'?'Mittel':'Niedrig',
        'Status':t.done?'Erledigt':'Offen',
        'Fällig am':t.due||'',
        'Zugewiesen':(t.assignees||[]).join(', '),
        'Ist-Kosten (€)':t.costActual||0,
        'Anbieter':v?v.name:'',
        'Teilaufgaben':subTotal>0?(subDone+'/'+subTotal):'',
        'Kommentare':(t.comments||[]).length
      };
    });
    const ws1=XLSX.utils.json_to_sheet(taskRows);
    ws1['!cols']=[{wch:30},{wch:14},{wch:10},{wch:10},{wch:12},{wch:20},{wch:14},{wch:20},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws1,'Aufgaben');

    /* --- Blatt 2: Anbieter --- */
    const vendorRows=vendors.map(v=>{
      const linked=tasks.filter(t=>t.vendorId===v.id&&!t.trashed).map(t=>t.title).join(', ');
      return {
        'Name':v.name,
        'Kategorie':v.cat||'',
        'Status':v.status||'',
        'Preis (€)':v.price||0,
        'Bewertung':v.rating?('★'.repeat(v.rating)+'☆'.repeat(5-v.rating)):'–',
        'Website':v.website||'',
        'Kontakt':v.contact_name||'',
        'E-Mail':v.contact_email||'',
        'Telefon':v.contact_phone||'',
        'Notizen':v.notes||'',
        'Verknüpfte Aufgaben':linked
      };
    });
    const ws2=XLSX.utils.json_to_sheet(vendorRows);
    ws2['!cols']=[{wch:24},{wch:14},{wch:12},{wch:12},{wch:12},{wch:24},{wch:18},{wch:24},{wch:16},{wch:24},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws2,'Anbieter');

    /* --- Blatt 3: Budget-Übersicht --- */
    const budgetRows=CATS.map(cat=>{
      const plan=catBudget[cat]||0;
      const act=tasks.filter(t=>t.cat===cat&&!t.trashed).reduce((s,t)=>s+(t.costActual||0),0);
      const diff=plan-act;
      return {
        'Kategorie':cat,
        'Plankosten (€)':plan,
        'Ist-Kosten (€)':act,
        'Differenz (€)':diff,
        'Auslastung (%)':plan>0?Math.round(act/plan*100):act>0?'∞':0
      };
    });
    const totalPlan=CATS.reduce((s,c)=>s+(catBudget[c]||0),0);
    const totalAct=tasks.filter(t=>!t.trashed).reduce((s,t)=>s+(t.costActual||0),0);
    budgetRows.push({
      'Kategorie':'GESAMT',
      'Plankosten (€)':totalPlan,
      'Ist-Kosten (€)':totalAct,
      'Differenz (€)':totalPlan-totalAct,
      'Auslastung (%)':totalPlan>0?Math.round(totalAct/totalPlan*100):0
    });
    budgetRows.unshift({'Kategorie':'Gesamtbudget','Plankosten (€)':totalBudget,'Ist-Kosten (€)':'','Differenz (€)':'','Auslastung (%)':''});
    const ws3=XLSX.utils.json_to_sheet(budgetRows);
    ws3['!cols']=[{wch:16},{wch:16},{wch:14},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws3,'Budget');

    /* --- Blatt 4: Budget-History --- */
    if(budgetHistory&&budgetHistory.length){
      const histRows=budgetHistory.slice().reverse().map(e=>({
        'Datum':new Date(e.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}),
        'Kategorie':e.cat||'',
        'Aufgabe':e.title||'',
        'Alter Betrag (€)':e.oldCost||0,
        'Neuer Betrag (€)':e.newCost||0,
        'Änderung (€)':(e.newCost||0)-(e.oldCost||0)
      }));
      const ws4=XLSX.utils.json_to_sheet(histRows);
      ws4['!cols']=[{wch:12},{wch:14},{wch:26},{wch:16},{wch:16},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws4,'Buchungen');
    }

    /* --- Download --- */
    const d=new Date();
    const dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    XLSX.writeFile(wb,'hochzeit_export_'+dateStr+'.xlsx');
    alert('✅ Excel-Export erstellt!\n\nBlätter: Aufgaben, Anbieter, Budget'+(budgetHistory?.length?', Buchungen':''));
  }catch(e){alert('❌ Fehler beim Excel-Export: '+e.message);}
};

/* ── VENDOR CRITERIA RATING ── */
window.rateVendorCriterion=async function(vendorId,criterion,val){
  var v=vendors.find(function(x){return x.id===vendorId;});if(!v)return;
  if(!v.ratings)v.ratings={};
  v.ratings[criterion]=val;
  var vCrit=vendorCriteria[v.cat]||vendorCriteria['Sonstiges'];
  var sum=0,cnt=0;
  vCrit.forEach(function(c){if(v.ratings[c]){sum+=v.ratings[c];cnt++;}});
  v.rating=cnt>0?Math.round(sum/cnt*10)/10:0;
  await save();renderAnbieter();
};
window.setVendorOverride=async function(vendorId,val){
  var v=vendors.find(function(x){return x.id===vendorId;});if(!v)return;
  v.ratingOverride=val;
  v.rating=val;
  await save();renderAnbieter();
};
window.clearVendorOverride=async function(vendorId){
  var v=vendors.find(function(x){return x.id===vendorId;});if(!v)return;
  v.ratingOverride=null;
  var vCrit=vendorCriteria[v.cat]||vendorCriteria['Sonstiges'];
  var sum=0,cnt=0;
  vCrit.forEach(function(c){if(v.ratings&&v.ratings[c]){sum+=v.ratings[c];cnt++;}});
  v.rating=cnt>0?Math.round(sum/cnt*10)/10:0;
  await save();renderAnbieter();
};
window.openCriteriaManager=function(cat){
  var criteria=vendorCriteria[cat]||[];
  var html='<div style="padding:16px"><h3 style="margin-bottom:12px">Kriterien: '+cat+'</h3>';
  html+='<div id="cm-list" style="margin-bottom:12px">';
  criteria.forEach(function(c,i){
    html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--br)">';
    html+='<span style="flex:1;font-size:13px">'+c+'</span>';
    html+='<button onclick="removeCriterion(\''+cat+'\','+i+')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px">×</button>';
    html+='</div>';
  });
  html+='</div>';
  html+='<div style="display:flex;gap:6px"><input type="text" id="cm-new-inp" placeholder="Neues Kriterium..." style="flex:1;padding:8px 10px;border:1px solid var(--br);border-radius:8px;font-size:13px;font-family:inherit"/>';
  html+='<button onclick="addCriterion(\''+cat+'\')" style="padding:8px 14px;border:none;border-radius:8px;background:var(--rose);color:#fff;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit">+</button></div>';
  html+='<button onclick="document.getElementById(\'criteria-mgr\').classList.remove(\'open\')" style="margin-top:16px;width:100%;padding:12px;border:none;border-radius:10px;background:var(--bg);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;color:var(--t)">Fertig</button>';
  html+='</div>';
  var mgr=document.getElementById('criteria-mgr');
  if(!mgr){
    mgr=document.createElement('div');mgr.id='criteria-mgr';mgr.className='overlay';mgr.style.zIndex='502';
    mgr.innerHTML='<div class="sheet" style="max-width:400px" id="cm-content"></div>';
    document.body.appendChild(mgr);
    mgr.addEventListener('click',function(e){if(e.target===mgr)mgr.classList.remove('open');});
  }
  document.getElementById('cm-content').innerHTML=html;
  mgr.classList.add('open');
};
window.addCriterion=async function(cat){
  var inp=document.getElementById('cm-new-inp');if(!inp)return;
  var val=inp.value.trim();if(!val)return;
  if(!vendorCriteria[cat])vendorCriteria[cat]=[];
  if(vendorCriteria[cat].includes(val)){alert('Kriterium existiert bereits.');return;}
  vendorCriteria[cat].push(val);
  await save();
  openCriteriaManager(cat);
};
window.removeCriterion=async function(cat,idx){
  if(!vendorCriteria[cat])return;
  var removed=vendorCriteria[cat].splice(idx,1)[0];
  vendors.forEach(function(v){if(v.cat===cat&&v.ratings&&v.ratings[removed])delete v.ratings[removed];});
  await save();
  openCriteriaManager(cat);
};

      // Header row
      h += '<tr><th style="position:sticky;left:0;z-index:2;padding:12px;font-size:12px;color:var(--t3);text-align:left;background:var(--bg);border-bottom:1px solid var(--br);min-width:120px;white-space:nowrap">Kriterium</th>';
      for(var ti=0;ti<shown.length;ti++) h += '<th style="padding:12px;font-size:13px;font-weight:700;text-align:center;border-bottom:1px solid var(--br);border-left:1px solid var(--br);min-width:120px;white-space:nowrap">' + shown[ti].name + '</th>';
      h += '</tr>';
      var tableRowsBase = [
        ['Status', function(v){ return v.status||'In Prüfung'; }],
        ['⌀ Bewertung', function(v){
          var vR=v.ratings||{};var vC=vendorCriteria[v.cat]||vendorCriteria['Sonstiges'];
          var s=0,c=0;vC.forEach(function(cr){if(vR[cr]){s+=vR[cr];c++;}});
          var avg=c>0?(s/c):0;var disp=v.ratingOverride!=null?v.ratingOverride:(avg||v.rating||0);
          var st='';for(var i=1;i<=5;i++)st+=(i<=Math.round(disp)?'★':'☆');
          return '<span style="color:#f5a623">'+st+'</span> '+(disp>0?disp.toFixed(1):'–');
        }]
      ];
      var allCritSets=shown.map(function(v){return vendorCriteria[v.cat]||vendorCriteria['Sonstiges'];});
      var allCritUnique=[];
      allCritSets.forEach(function(cs){cs.forEach(function(c){if(allCritUnique.indexOf(c)===-1)allCritUnique.push(c);});});
      allCritUnique.forEach(function(crit){
        tableRowsBase.push(['  '+crit, function(v){
          var val=(v.ratings||{})[crit];
          if(!val)return '<span style="color:#ccc">–</span>';
          var s='';for(var i=1;i<=5;i++)s+=(i<=val?'★':'☆');
          return '<span style="color:#f5a623;font-size:12px">'+s+'</span>';
        }]);
      });
      var tableRows = tableRowsBase.concat([
        ['Preis', function(v){ return v.price?eur(v.price):'–'; }],
        ['Kontakt', function(v){ return v.contact_name||'–'; }],
        ['E-Mail', function(v){ return v.contact_email||'–'; }],
        ['Telefon', function(v){ return v.contact_phone||'–'; }],
        ['Notizen', function(v){ return v.notes||'–'; }],
        ['Aufgaben', function(v){ return tasks.filter(function(t){return t.vendorId===v.id&&!t.trashed;}).length||'–'; }]
      ]);
      for(var ri=0;ri<tableRows.length;ri++){
        h += '<tr><td style="position:sticky;left:0;z-index:1;padding:10px 12px;font-size:12px;font-weight:600;color:var(--t3);background:var(--bg);border-top:1px solid var(--br);white-space:nowrap">' + tableRows[ri][0] + '</td>';
        for(var ti2=0;ti2<shown.length;ti2++) h += '<td style="padding:10px 12px;font-size:13px;text-align:center;border-top:1px solid var(--br);border-left:1px solid var(--br);min-width:120px">' + tableRows[ri][1](shown[ti2]) + '</td>';
        h += '</tr>';
      }
      h += '</table></div>';
    }
  }

  a.innerHTML = h;
  attachAnbieterListeners(cats);
  // Restore search focus
  if(vendorSearch){var vsi=a.querySelector('.vendor-search-input');if(vsi){vsi.focus();vsi.selectionStart=vsi.selectionEnd=vsi.value.length;}}
}

function attachAnbieterListeners(cats){
  var a = document.getElementById('scroll');

  // View toggle
  var kBtn = document.getElementById('btn-vview-karten');
  var vBtn = document.getElementById('btn-vview-vergleich');
  if(kBtn){ kBtn.style.background = vView==='karten'?'var(--rose)':'rgba(120,120,128,.1)'; kBtn.style.color = vView==='karten'?'#fff':'var(--t2)'; kBtn.addEventListener('click', function(){ vView='karten'; renderAnbieter(); }); }
  if(vBtn){ vBtn.style.background = vView==='vergleich'?'var(--rose)':'rgba(120,120,128,.1)'; vBtn.style.color = vView==='vergleich'?'#fff':'var(--t2)'; vBtn.addEventListener('click', function(){ vView='vergleich'; renderAnbieter(); }); }

  // Filter tabs
  for(var ci=0; ci<cats.length; ci++){
    (function(cat){
      var el = document.getElementById('vfilter-' + ci);
      // reassign ci via closure issue fix
    })(cats[ci]);
  }
  // Simpler filter tab approach
  a.querySelectorAll('.v-ftab').forEach(function(btn){
    btn.addEventListener('click', function(){
      var txt = btn.textContent.trim();
      if(btn.id === 'vfilter-trash') { vFilter = 'Papierkorb'; }
      else { vFilter = txt; }
      renderAnbieter();
    });
  });

  // Add vendor button handled by body delegator via data-body-action

  // CSV buttons
  var dlBtn = document.getElementById('btn-csv-dl');
  if(dlBtn) dlBtn.addEventListener('click', downloadCSVTemplate);
  var impBtn = document.getElementById('btn-csv-import');
  if(impBtn) impBtn.addEventListener('click', function(){ document.getElementById('csv-file-input').click(); });

  // Make vendor cards clickable to open vendor popup
  a.querySelectorAll('.v-card').forEach(function(card){
    card.addEventListener('click', function(e){
      if(e.target.closest('.v-btn')) return;
      var vid = parseInt(card.dataset.vid);
      if(vid) openVendorPopup(vid);
    });
  });

  // Compare view: vendor selection chips
  a.querySelectorAll('.v-compare-chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      var vid = parseInt(chip.dataset.vid);
      var idx = vCompareIds.indexOf(vid);
      if(idx > -1){ vCompareIds.splice(idx, 1); } else { vCompareIds.push(vid); }
      renderAnbieter();
    });
  });
}

function openVendorPopup(id){
  var v=vendors.find(function(x){return x.id===id;});

  var isA=role==='admin';
  var isH=role==='mithelfer';

  // Criteria data
  var vRatings=v.ratings||{};
  var vCrit=vendorCriteria[v.cat]||vendorCriteria['Sonstiges'];

  vCrit.forEach(function(c){if(vRatings[c]){ratedCount++;ratedSum+=vRatings[c];}});
  var avgRating=ratedCount>0?(ratedSum/ratedCount):0;

    if(v.contact_email) html+='<a href="mailto:'+v.contact_email+'" class="sheet2-contact-btn" title="E-Mail senden">✉</a>';

    html+='</div>';
  } else {

    if(v.contact_email) html+='<div class="sheet2-input-row"><label>E-Mail</label><span style="flex:1;font-size:14px;color:var(--t)">'+v.contact_email+'</span><a href="mailto:'+v.contact_email+'" class="sheet2-contact-btn" title="E-Mail senden">✉</a></div>';
    if(v.contact_phone) html+='<div class="sheet2-input-row"><label>Telefon</label><span style="flex:1;font-size:14px;color:var(--t)">'+v.contact_phone+'</span><a href="tel:'+v.contact_phone+'" class="sheet2-contact-btn" title="Anrufen">📞</a></div>';

  html+='</div>';

  // Rating criteria section
  html+='<div class="sheet2-section"><div class="sheet2-section-label">Bewertung</div>';

  // Individual criteria stars
  html+='<div class="sheet2-criteria-list">';
  vCrit.forEach(function(c){
    var val=vRatings[c]||0;
    var cStars='';
    for(var cs=1;cs<=5;cs++) cStars+='<span class="vc-star" data-vid="'+v.id+'" data-criterion="'+c+'" data-val="'+cs+'" style="color:'+(cs<=val?'#f5a623':'#ccc')+'">'+(cs<=val?'★':'☆')+'</span>';
    html+='<div class="sheet2-star-row"><span class="star-label">'+c+'</span><span class="star-icons">'+cStars+'</span></div>';

  for(var os=1;os<=5;os++) html+='<span class="vco-star" data-vid="'+v.id+'" data-val="'+os+'" style="color:'+(v.ratingOverride!=null&&os<=v.ratingOverride?'var(--rose)':'#ccc')+'">'+(v.ratingOverride!=null&&os<=v.ratingOverride?'★':'☆')+'</span>';
  if(v.ratingOverride!=null)html+='<button class="vclear-override" data-vid="'+v.id+'">✕ Auto</button>';
  html+='</div></div>';
  html+='<button class="vmanage-criteria" data-cat="'+v.cat+'">⚙ Kriterien bearbeiten</button>';
  html+='</div>';

  // Linked tasks
  var linkedTasks=tasks.filter(function(t2){return t2.vendorId===v.id&&!t2.trashed;});
  if(linkedTasks.length){
    html+='<div class="sheet2-section"><div class="sheet2-section-label">Verknüpfte Aufgaben</div>';
    linkedTasks.forEach(function(lt){
      var dueStr=lt.due?' (fällig '+fmt(lt.due)+')':'';
      html+='<div class="sheet2-linked-task" onclick="openTaskById('+lt.id+');document.getElementById(\'vendor-popup\').classList.remove(\'open\')">• '+lt.title+dueStr+'</div>';
    });
    html+='</div>';
  }

  // Documents
  html+='<div class="sheet2-section"><div class="sheet2-section-label">Dokumente</div>';
  var vDocs=v.docs||[];
  if(vDocs.length){
    html+='<div class="doc-list">';
    for(var di=0;di<vDocs.length;di++){
      var dc=vDocs[di];
      var dico=dc.name.match(/\.(pdf)$/i)?'📄':dc.name.match(/\.(xlsx?|csv)$/i)?'📊':dc.name.match(/\.(docx?|txt)$/i)?'📝':dc.name.match(/\.(jpe?g|png|gif|webp)$/i)?'🖼️':'📎';
      html+='<div class="doc-item"><span class="doc-ico">'+dico+'</span><span class="doc-name">'+dc.name+'</span><a href="'+dc.url+'" target="_blank" rel="noopener">Öffnen</a>'+(canEdit?'<button class="doc-del" onclick="removeVendorDoc('+v.id+','+di+')" title="Entfernen">×</button>':'')+'</div>';
    }
    html+='</div>';
  } else {

  // Attach event listeners
  var vpc=document.getElementById('vendor-popup-content');

  // Auto-save for inline fields
  function vpAutoSave(){
    var nameEl=document.getElementById('vp-name');if(nameEl)v.name=nameEl.value.trim()||v.name;
    var priceEl=document.getElementById('vp-price');if(priceEl)v.price=parseFloat(priceEl.value)||0;
    var webEl=document.getElementById('vp-web');if(webEl)v.website=webEl.value.trim();
    var cnameEl=document.getElementById('vp-cname');if(cnameEl)v.contact_name=cnameEl.value.trim();
    var cemailEl=document.getElementById('vp-cemail');if(cemailEl)v.contact_email=cemailEl.value.trim();
    var cphoneEl=document.getElementById('vp-cphone');if(cphoneEl)v.contact_phone=cphoneEl.value.trim();
    var notesEl=document.getElementById('vp-notes');if(notesEl)v.notes=notesEl.value.trim();

  }
  ['vp-name','vp-price','vp-web','vp-cname','vp-cemail','vp-cphone','vp-notes'].forEach(function(elId){
    var el=document.getElementById(elId);
    if(el)el.addEventListener('input',vpAutoSave);
  });

  // Category dropdown
  vpc.querySelectorAll('#vp-cat-dd .sheet2-chip-dropdown-item').forEach(function(item){
    item.addEventListener('click',function(){
      v.cat=item.dataset.vcat;
      sheet2AutoSave();
      openVendorPopup(v.id);
    });
  });

  // Status dropdown
  vpc.querySelectorAll('#vp-status-dd .sheet2-chip-dropdown-item').forEach(function(item){
    item.addEventListener('click',function(){
      v.status=item.dataset.vstatus;
      sheet2AutoSave();
      openVendorPopup(v.id);
    });
  });

  // Close dropdowns on outside click
  vpc.addEventListener('click',function(e){
    var wrap=e.target.closest('.sheet2-chip-wrap');
    vpc.querySelectorAll('.sheet2-chip-dropdown.open').forEach(function(dd){
      if(!wrap||!wrap.contains(dd)) dd.classList.remove('open');
    });
  });

  // Save button
  var saveBtn=document.getElementById('vp-save-btn');
  if(saveBtn){saveBtn.addEventListener('click',async function(){
    vpAutoSave();
    clearTimeout(_sheet2SaveTimer);
    await save();
    document.getElementById('vendor-popup').classList.remove('open');
    renderAnbieter();
  });}

  // Delete button (move to trash)
  var delBtn=document.getElementById('vp-del-btn');
  if(delBtn){delBtn.addEventListener('click',async function(){
    if(!confirm('Anbieter in den Papierkorb verschieben?'))return;
    var vid=parseInt(delBtn.dataset.vid);
    var vv=vendors.find(function(x){return x.id===vid;});
    if(vv){vv.trashed=true;vv.trashedAt=Date.now();}
    await save();
    document.getElementById('vendor-popup').classList.remove('open');
    renderAnbieter();
  });}

  // Restore button (from trash)
  var restoreBtn=document.getElementById('vp-restore-btn');
  if(restoreBtn){restoreBtn.addEventListener('click',async function(){
    var vid=parseInt(restoreBtn.dataset.vid);
    var vv=vendors.find(function(x){return x.id===vid;});
    if(vv){delete vv.trashed;delete vv.trashedAt;}
    await save();
    document.getElementById('vendor-popup').classList.remove('open');
    renderAnbieter();
  });}

  // Delete final button (permanent delete from trash)
  var delFinalBtn=document.getElementById('vp-del-final-btn');
  if(delFinalBtn){delFinalBtn.addEventListener('click',async function(){
    if(!confirm('Anbieter endgültig löschen? Kann nicht rückgängig gemacht werden.'))return;
    var vid=parseInt(delFinalBtn.dataset.vid);
    vendors=vendors.filter(function(x){return x.id!==vid;});
    await save();
    document.getElementById('vendor-popup').classList.remove('open');
    renderAnbieter();
  });}

  // Criteria star clicks (delegated)
  vpc.addEventListener('click',async function(e){
    var star=e.target.closest('.vc-star');
    if(star){
      var svid=parseInt(star.dataset.vid);
      var criterion=star.dataset.criterion;
      var sval=parseInt(star.dataset.val);
      await window.rateVendorCriterion(svid,criterion,sval);
      openVendorPopup(svid);
      return;
    }
    var ostar=e.target.closest('.vco-star');
    if(ostar){
      var ovid=parseInt(ostar.dataset.vid);
      var oval=parseInt(ostar.dataset.val);
      await window.setVendorOverride(ovid,oval);
      openVendorPopup(ovid);
      return;
    }
    var clearBtn2=e.target.closest('.vclear-override');
    if(clearBtn2){
      var cvid=parseInt(clearBtn2.dataset.vid);
      await window.clearVendorOverride(cvid);
      openVendorPopup(cvid);
      return;
    }
    var mgBtn=e.target.closest('.vmanage-criteria');
    if(mgBtn){
      window.openCriteriaManager(mgBtn.dataset.cat);
      return;
    }
  });
}

async function importCSVFile(){
  try{
    var fileInput = document.getElementById('csv-file-input');
    var file = fileInput ? fileInput.files[0] : null;
    if(!file){ alert('Keine Datei ausgewählt.'); return; }
    var text = await file.text();
    // Strip BOM (Excel/Windows adds this)
    text = text.replace(/^\uFEFF/, '');
    // Normalize line endings
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    var lines = text.trim().split('\n');
    if(lines.length < 2){ alert('CSV leer oder ungültig.'); return; }
    // Auto-detect delimiter: semicolon (German Excel) or comma
    var delim = lines[0].includes(';') ? ';' : ',';
    var headers = lines[0].split(delim).map(function(h){ return h.trim().toLowerCase().replace(/^["']|["']$/g, ''); });
    function get(row, key){ var i=headers.indexOf(key); return i>-1?(row[i]||'').trim().replace(/^["']|["']$/g, ''):''; }
    var imported = [];
    for(var i=1;i<lines.length;i++){
      if(!lines[i].trim()) continue;
      var row = lines[i].split(delim);
      var name = get(row,'name');
      if(!name) continue;
      imported.push({ id:vnid++, name:name, cat:get(row,'kategorie')||'Sonstiges', price:parseFloat(get(row,'preis'))||0, rating:parseInt(get(row,'bewertung'))||0, status:get(row,'status')||'In Prüfung', website:get(row,'website')||'', contact_name:get(row,'kontakt_name')||'', contact_email:get(row,'kontakt_email')||'', contact_phone:get(row,'kontakt_telefon')||'', notes:get(row,'notizen')||'', createdAt:Date.now() });
    }
    if(!imported.length){ alert('Keine gültigen Einträge gefunden. Prüfe ob die CSV-Spalten korrekt benannt sind (Name, Kategorie, Preis, etc.).'); return; }
    // Check for duplicates (same name, case-insensitive)
    var toAdd = [];
    var skipped = 0;
    for(var di=0; di<imported.length; di++){
      var imp = imported[di];
      var existing = vendors.find(function(v){ return v.name.toLowerCase().trim() === imp.name.toLowerCase().trim() && !v.trashed; });
      if(existing){
        var addAnyway = confirm('„' + imp.name + '" existiert bereits (Kategorie: ' + existing.cat + ').\n\nTrotzdem hinzufügen?');
        if(addAnyway){ toAdd.push(imp); } else { skipped++; }
      } else {
        toAdd.push(imp);
      }
    }
    if(!toAdd.length){ alert('Keine neuen Anbieter importiert. ' + (skipped ? skipped + ' Duplikat(e) übersprungen.' : '')); fileInput.value=''; return; }
    if(!confirm(toAdd.length + ' Anbieter importieren?' + (skipped ? ' (' + skipped + ' Duplikat(e) übersprungen)' : ''))) { fileInput.value=''; return; }
    vendors = vendors.concat(toAdd);
    await save();
    fileInput.value = '';
    renderAnbieter();
    alert(toAdd.length + ' Anbieter erfolgreich importiert!' + (skipped ? ' ' + skipped + ' Duplikat(e) übersprungen.' : ''));
  }catch(e){
    alert('Fehler beim CSV-Import: '+e.message);
  }
}
