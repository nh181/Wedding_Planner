<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c2185b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Luisa & Nico" />
  <title>Hochzeit Luisa & Nico</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #c2185b; --rose-light: #fce4ec; --rose-mid: #f48fb1; --rose-dark: #880e4f;
      --sage: #4caf50; --sage-light: #e8f5e9;
      --amber: #f59e0b; --amber-light: #fffbeb;
      --red: #ef4444; --red-light: #fef2f2;
      --blue: #3b82f6; --blue-light: #eff6ff;
      --purple: #8b5cf6; --purple-light: #f5f3ff;
      --bg: #fdfaf8; --surface: #ffffff;
      --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.14);
      --text: #1a1a1a; --text-2: #555; --text-3: #888;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; }

    /* HEADER */
    .header { background: var(--rose); padding: calc(var(--safe-top) + 12px) 16px 0; flex-shrink: 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; }
    .header h1 { font-family: 'Lora', serif; font-size: 21px; color: white; font-weight: 600; }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .icon-btn:active { background: rgba(255,255,255,0.35); }

    /* NAV TABS */
    .nav-tabs { display: flex; border-top: 1px solid rgba(255,255,255,0.2); }
    .nav-tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.7); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .nav-tab.active { color: white; border-bottom-color: white; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat { padding: 9px 4px; text-align: center; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 19px; font-weight: 500; }
    .stat-val.rose { color: var(--rose); }
    .stat-val.green { color: var(--sage); }
    .stat-val.amber { color: var(--amber); }
    .stat-label { font-size: 10px; color: var(--text-3); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* FILTERS */
    .filters { display: flex; gap: 6px; padding: 9px 14px; background: var(--bg); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .f-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 999px; white-space: nowrap; border: 1px solid var(--border-mid); background: var(--surface); color: var(--text-2); cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
    .f-btn.active { background: var(--rose); color: white; border-color: var(--rose); }

    /* SCROLL AREA */
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 14px calc(var(--safe-bottom) + 10px); }

    /* ALERT BANNER */
    .alert-banner { border-radius: 12px; padding: 11px 14px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; }
    .alert-banner.warning { background: var(--amber-light); border: 1px solid #fcd34d; }
    .alert-banner.info { background: var(--blue-light); border: 1px solid #93c5fd; }
    .alert-banner.success { background: var(--sage-light); border: 1px solid #86efac; }
    .alert-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .alert-text { font-size: 13px; line-height: 1.45; }
    .alert-text strong { font-weight: 500; display: block; margin-bottom: 2px; }

    /* COUNTDOWN */
    .countdown-card { background: linear-gradient(135deg, var(--rose) 0%, #ad1457 100%); border-radius: 14px; padding: 16px; margin-bottom: 10px; color: white; display: flex; align-items: center; justify-content: space-between; }
    .countdown-left p { font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
    .countdown-left h3 { font-family: 'Lora', serif; font-size: 17px; margin-top: 2px; }
    .countdown-left .date { font-size: 13px; opacity: 0.85; margin-top: 3px; }
    .countdown-days { text-align: right; }
    .countdown-days .num { font-family: 'Lora', serif; font-size: 44px; font-weight: 600; line-height: 1; }
    .countdown-days .label { font-size: 11px; opacity: 0.8; }

    /* PROGRESS */
    .progress-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-header span { font-size: 13px; color: var(--text-2); }
    .progress-header strong { font-size: 15px; font-weight: 500; }
    .progress-bar { height: 8px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--rose-mid), var(--rose)); transition: width 0.5s ease; }
    .motivation { font-size: 13px; color: var(--rose-dark); margin-top: 8px; font-style: italic; }

    /* TASK CARD */
    .task-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; display: grid; grid-template-columns: 28px 1fr 8px; gap: 10px; align-items: start; transition: transform 0.1s; }
    .task-card:active { transform: scale(0.985); }
    .task-card.done { opacity: 0.45; }
    .check-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border-mid); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; margin-top: 1px; }
    .check-btn.done { background: var(--sage); border-color: var(--sage); }
    .check-icon { display: none; }
    .check-btn.done .check-icon { display: block; }
    .check-icon svg { width: 13px; height: 13px; }
    .task-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.35; }
    .task-card.done .task-title { text-decoration: line-through; }
    .task-meta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
    .chip.person { background: var(--rose-light); color: var(--rose-dark); font-weight: 500; }
    .chip.cat { background: #f1f5f9; color: #475569; }
    .chip.due { background: transparent; color: var(--text-3); padding-left: 0; }
    .chip.due.late { color: var(--red); font-weight: 500; }
    .chip.due.soon { color: var(--amber); font-weight: 500; }
    .chip.suggested { background: var(--purple-light); color: var(--purple); }
    .prio-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 9px; flex-shrink: 0; }
    .prio-dot.hoch { background: var(--red); }
    .prio-dot.mittel { background: var(--amber); }
    .prio-dot.niedrig { background: var(--sage); }

    /* SECTION HEADER */
    .section-header { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin: 14px 0 8px; }

    /* TEMPLATE CARDS */
    .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .template-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.15s; text-align: left; }
    .template-card:active { transform: scale(0.97); border-color: var(--rose); }
    .template-icon { font-size: 22px; margin-bottom: 6px; }
    .template-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .template-count { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .template-card.added { border-color: var(--sage); background: var(--sage-light); }
    .template-card.added .template-name { color: #166534; }

    /* TIMELINE */
    .timeline-item { display: flex; gap: 12px; margin-bottom: 14px; }
    .timeline-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
    .timeline-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--rose); flex-shrink: 0; margin-top: 3px; }
    .timeline-dot.done { background: var(--sage); }
    .timeline-dot.late { background: var(--red); }
    .timeline-dot.future { background: var(--border-mid); }
    .timeline-line { width: 2px; flex: 1; background: var(--border); margin-top: 4px; }
    .timeline-time { font-size: 10px; color: var(--text-3); text-align: center; margin-top: 4px; }
    .timeline-content { flex: 1; padding-bottom: 6px; }
    .timeline-phase { font-size: 12px; font-weight: 500; color: var(--rose-dark); margin-bottom: 4px; }
    .timeline-tasks { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    /* EMPTY */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-3); font-size: 15px; }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal { width: 100%; background: var(--surface); border-radius: 20px 20px 0 0; padding: 0 16px calc(var(--safe-bottom) + 20px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(.32,1,.23,1); max-height: 90dvh; overflow-y: auto; }
    .modal-bg.open .modal { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-mid); margin: 12px auto 16px; }
    .modal h2 { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .fg { margin-bottom: 13px; }
    .fg label { font-size: 11px; color: var(--text-3); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .fg input, .fg select { width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border-mid); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); -webkit-appearance: none; appearance: none; }
    .fg input:focus, .fg select:focus { outline: 2px solid var(--rose); border-color: transparent; }
    .modal-footer { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid var(--border-mid); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text-2); cursor: pointer; }
    .btn-save { flex: 2; padding: 13px; border-radius: 12px; border: none; background: var(--rose); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; color: white; cursor: pointer; }

    /* SETTINGS */
    .settings-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .settings-label { font-size: 14px; font-weight: 500; }
    .settings-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .settings-val { font-size: 13px; color: var(--rose); font-weight: 500; }
    .danger-btn { width: 100%; padding: 13px; border-radius: 12px; border: 1px solid #fca5a5; background: var(--red-light); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--red); cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="pw-screen" style="position:fixed;inset:0;background:#fdfaf8;z-index:9999;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:340px;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">💍</div>
    <h1 style="font-family:'Lora',serif;font-size:24px;font-weight:600;color:#1a1a1a;margin-bottom:6px;">Luisa & Nico</h1>
    <p style="font-size:14px;color:#888;margin-bottom:28px;">Bitte Passwort eingeben</p>
    <input type="password" id="pw-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')checkPw()"
      style="width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(0,0,0,0.15);background:#fff;font-size:16px;font-family:sans-serif;color:#1a1a1a;outline:none;margin-bottom:10px;-webkit-appearance:none;" />
    <div id="pw-error" style="font-size:13px;color:#ef4444;margin-bottom:10px;min-height:18px;"></div>
    <button onclick="checkPw()"
      style="width:100%;padding:13px;border-radius:12px;border:none;background:#c2185b;color:white;font-size:16px;font-weight:500;font-family:sans-serif;cursor:pointer;">
      Anmelden
    </button>
  </div>
</div>

<script>
(function() {
  const auth = localStorage.getItem('hp_auth');
  if (auth && Date.now() < parseInt(auth)) {
    document.getElementById('pw-screen').style.display = 'none';
  }
})();
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === '2003LK/NH') {
    localStorage.setItem('hp_auth', Date.now() + 24 * 60 * 60 * 1000);
    document.getElementById('pw-screen').style.display = 'none';
  } else {
    document.getElementById('pw-error').textContent = 'Falsches Passwort. Bitte erneut versuchen.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
</script>

<header class="header">
  <div class="header-top">

<!-- ADD TASK MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Neue Aufgabe</h2>
    <div class="fg"><label>Aufgabe</label><input type="text" id="f-title" placeholder="z.B. Blumendekoration buchen" /></div>

<script>
const DEFAULTS = [
  { id:1, title:'Standesamt Termin buchen', person:'Anna', cat:'Sonstiges', prio:'hoch', due:'2026-04-15', done:false },
  { id:2, title:'Hochzeitslocation besichtigen', person:'Beide', cat:'Location', prio:'hoch', due:'2026-04-30', done:true },
  { id:3, title:'Fotografen anfragen', person:'Max', cat:'Fotografie', prio:'mittel', due:'2026-05-10', done:false },
  { id:4, title:'Einladungen gestalten & drucken', person:'Anna', cat:'Einladungen', prio:'mittel', due:'2026-05-20', done:false },
  { id:5, title:'Catering Angebote vergleichen', person:'Max', cat:'Catering', prio:'hoch', due:'2026-03-18', done:false },
  { id:6, title:'Brautkleid Anprobe', person:'Anna', cat:'Kleidung', prio:'mittel', due:'2026-06-01', done:false },
  { id:7, title:'DJ oder Band buchen', person:'Beide', cat:'Musik', prio:'niedrig', due:'2026-07-01', done:false },
];

const TEMPLATES = [
  { id:'location', icon:'🏰', name:'Location', tasks:[
    'Locations besichtigen','Vertrag unterschreiben','Raumplan erstellen','Parkplätze klären','Übernachtungsoptionen prüfen'
  ]},
  { id:'catering', icon:'🍽️', name:'Catering', tasks:[
    'Angebote einholen','Menü auswählen','Weinauswahl treffen','Torte bestellen','Diäten/Allergien erfassen'
  ]},
  { id:'fotografie', icon:'📸', name:'Fotografie', tasks:[
    'Fotografen anfragen','Portfolio prüfen','Vertrag abschließen','Wunschliste erstellen','Videograf anfragen'
  ]},
  { id:'dekoration', icon:'💐', name:'Dekoration', tasks:[
    'Stil & Farbschema festlegen','Florist anfragen','Tischdeko planen','Sitzordnung erstellen','Beleuchtung klären'
  ]},
  { id:'musik', icon:'🎵', name:'Musik', tasks:[
    'DJ oder Band anfragen','Playlist erstellen','Einzugslied wählen','Tanzkurs buchen','Musikanlage prüfen'
  ]},
  { id:'kleidung', icon:'👗', name:'Kleidung', tasks:[
    'Brautkleid kaufen','Anzug / Kostüm kaufen','Accessoires auswählen','Schneiderin beauftragen','Schuhe kaufen'
  ]},
  { id:'einladungen', icon:'✉️', name:'Einladungen', tasks:[
    'Gästeliste erstellen','Einladungsdesign auswählen','Druckerei beauftragen','Einladungen versenden','RSVPs tracken'
  ]},
  { id:'flitterwochen', icon:'✈️', name:'Flitterwochen', tasks:[
    'Reiseziel festlegen','Flüge buchen','Hotel buchen','Reiseversicherung abschließen','Koffer packliste erstellen'
  ]},
];

const MOTIVATIONS = [
  '🌸 Ihr seid auf einem tollen Weg!',
  '💪 Weiter so, ihr schafft das!',
  '✨ Jede erledigte Aufgabe bringt euch näher zum großen Tag!',
  '🎉 Fantastisch! Der große Tag kommt näher!',
  '💍 Ihr seid ein super Team!',
  '🌟 So gut organisiert – das wird wunderschön!',
];

let tasks = JSON.parse(localStorage.getItem('hp_tasks2') || 'null') || DEFAULTS;
let weddingDate = localStorage.getItem('hp_wedding') || '';
let addedTemplates = JSON.parse(localStorage.getItem('hp_templates') || '[]');
let nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
let filter = 'alle';
let activeTab = 'aufgaben';
const today = new Date().toISOString().split('T')[0];

function save() {
  localStorage.setItem('hp_tasks2', JSON.stringify(tasks));
  localStorage.setItem('hp_wedding', weddingDate);
  localStorage.setItem('hp_templates', JSON.stringify(addedTemplates));
}

function fmt(d) { if(!d) return ''; const [y,m,day]=d.split('-'); return `${day}.${m}.${y}`; }

function daysLeft(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}

function updateStats() {
  const t = tasks.length, done = tasks.filter(x=>x.done).length;
  document.getElementById('s-total').textContent = t;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-open').textContent = t - done;
  document.getElementById('s-late').textContent = tasks.filter(x=>!x.done&&x.due&&x.due<today).length;
}

function getMotivation(pct) {
  if (pct === 100) return '🎊 Alles erledigt – ihr seid bereit!';
  if (pct >= 75) return MOTIVATIONS[3];
  if (pct >= 50) return MOTIVATIONS[0];
  if (pct >= 25) return MOTIVATIONS[1];
  return MOTIVATIONS[5];
}

function renderAufgaben() {
  const area = document.getElementById('scroll-area');
  let html = '';

  // Countdown
  if (weddingDate) {
    const dl = daysLeft(weddingDate);
    html += `<div class="countdown-card">
      <div class="countdown-left">
        <p>Bis zur Hochzeit</p>
        <h3>${dl > 0 ? 'Noch nicht lange hin!' : '🎉 Der große Tag!'}</h3>
        <div class="date">${fmt(weddingDate)}</div>
      </div>
      <div class="countdown-days">
        <div class="num">${dl > 0 ? dl : '🎊'}</div>
        <div class="label">${dl > 0 ? 'Tage' : ''}</div>
      </div>
    </div>`;
  } else {
    html += `<div class="alert-banner info"><div class="alert-icon">📅</div><div class="alert-text"><strong>Hochzeitsdatum festlegen</strong>Gehe zu "Info" um euer Datum einzutragen – dann siehst du den Countdown!</div></div>`;
  }

  // Progress
  const total = tasks.length, done = tasks.filter(t=>t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  html += `<div class="progress-card">
    <div class="progress-header"><span>Fortschritt</span><strong>${pct}% erledigt</strong></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="motivation">${getMotivation(pct)}</div>
  </div>`;

  // Smart alerts
  const late = tasks.filter(t=>!t.done&&t.due&&t.due<today);
  const thisWeek = tasks.filter(t=>{
    if(t.done||!t.due) return false;
    const dl = daysLeft(t.due);
    return dl>=0 && dl<=7;
  });
  if (late.length > 0) {
    html += `<div class="alert-banner warning"><div class="alert-icon">⚠️</div><div class="alert-text"><strong>${late.length} Aufgabe${late.length>1?'n sind':' ist'} überfällig!</strong>${late.map(t=>t.title).join(', ')}</div></div>`;
  }
  if (thisWeek.length > 0 && late.length === 0) {
    html += `<div class="alert-banner info"><div class="alert-icon">📌</div><div class="alert-text"><strong>${thisWeek.length} Aufgabe${thisWeek.length>1?'n':'} ist'} diese Woche fällig</strong>${thisWeek.map(t=>t.title).slice(0,3).join(', ')}${thisWeek.length>3?'…':''}</div></div>`;
  }

  // Tasks
  let vis = tasks;
  if (filter==='offen') vis=tasks.filter(t=>!t.done);
  else if (filter==='erledigt') vis=tasks.filter(t=>t.done);
  else if (filter==='hoch') vis=tasks.filter(t=>t.prio==='hoch'&&!t.done);
  else if (filter==='diese-woche') vis=tasks.filter(t=>{if(t.done||!t.due)return false;const dl=daysLeft(t.due);return dl>=0&&dl<=7;});
  else if (['location','catering','dekoration'].includes(filter)) vis=tasks.filter(t=>t.cat.toLowerCase().startsWith(filter==='dekoration'?'deko':filter));

  if (!vis.length) {
    html += `<div class="empty"><div class="empty-icon">🌸</div>Keine Aufgaben gefunden.</div>`;
  } else {
    html += vis.map(t => {
      const late = !t.done && t.due && t.due < today;
      const dl = t.due ? daysLeft(t.due) : null;
      const soon = !late && dl !== null && dl <= 7 && dl >= 0;
      const dueLabel = t.due ? (late ? `⚠ ${fmt(t.due)}` : (soon ? `in ${dl}d` : fmt(t.due))) : '';
      return `<div class="task-card ${t.done?'done':''}">
        <button class="check-btn ${t.done?'done':''}" onclick="toggle(${t.id})">
          <span class="check-icon"><svg viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </button>
        <div>
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            ${t.person?`<span class="chip person">${t.person}</span>`:''}
            <span class="chip cat">${t.cat}</span>
            ${t.due?`<span class="chip due ${late?'late':soon?'soon':''}">${dueLabel}</span>`:''}
            ${t.due&&!t.done?`<span class="chip" onclick="exportCal(${t.id})" style="cursor:pointer;background:#EAF3DE;color:#27500A;">📅 Kalender</span>`:''}
          </div>
        </div>
        <div class="prio-dot ${t.prio}"></div>
      </div>`;
    }).join('');
  }

  area.innerHTML = html;
}

function exportCal(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t || !t.due) return;
  const [y,m,d] = t.due.split('-');
  const dateStr = `${y}${m}${d}`;
  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Hochzeitsplaner//DE',
    'BEGIN:VEVENT',
    `UID:${t.id}-${Date.now()}@hochzeitsplaner`,
    `DTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z`,
    `DTSTART;VALUE=DATE:${dateStr}`,
    `DTEND;VALUE=DATE:${dateStr}`,
    `SUMMARY:💍 ${t.title}`,
    `DESCRIPTION:Kategorie: ${t.cat}${t.person?' | Zuständig: '+t.person:''}`,
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
  const blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${t.title.replace(/[^a-zA-Z0-9]/g,'_')}.ics`;
  a.click(); URL.revokeObjectURL(url);
}

function renderZeitplan() {
  const area = document.getElementById('scroll-area');
  if (!weddingDate) {
    area.innerHTML = `<div class="alert-banner info"><div class="alert-icon">📅</div><div class="alert-text"><strong>Kein Hochzeitsdatum</strong>Bitte trage euer Datum unter "Info" ein.</div></div>`;
    return;
  }
  const wd = new Date(weddingDate);
  const phases = [
    { label:'12+ Monate vorher', months:12, tasks:['Location buchen','Budget festlegen','Gästeliste erstellen','Datum beim Standesamt reservieren'] },
    { label:'9–12 Monate vorher', months:9, tasks:['Catering anfragen','Fotografen buchen','Kleid anprobieren','Einladungsdesign wählen'] },
    { label:'6–9 Monate vorher', months:6, tasks:['Einladungen versenden','Flitterwochen planen','Ringe auswählen','Musikband / DJ buchen'] },
    { label:'3–6 Monate vorher', months:3, tasks:['Menü finalisieren','Sitzordnung planen','Hochzeitstorte bestellen','Accessoires kaufen'] },
    { label:'1–3 Monate vorher', months:1, tasks:['Letzte Anprobe','Ablaufplan erstellen','Trauringe abholen','Beauty-Termin buchen'] },
    { label:'Letzte Woche', months:0, tasks:['Koffer packen','Final-Check mit Dienstleistern','Umschläge mit Dankeskarten vorbereiten'] },
  ];

  let html = `<div class="section-header">Euer Hochzeits-Zeitplan</div>`;
  const now = new Date();
  phases.forEach((phase, i) => {
    const phaseDate = new Date(wd);
    phaseDate.setMonth(phaseDate.getMonth() - phase.months);
    const isPast = now > phaseDate;
    const isCurrent = i < phases.length-1 && now > phaseDate && now < new Date(wd.getFullYear(), wd.getMonth()-phases[i+1]?.months||0, wd.getDate());
    html += `<div class="timeline-item">
      <div class="timeline-left">
        <div class="timeline-dot ${isPast?'done':'future'}"></div>
        ${i < phases.length-1 ? '<div class="timeline-line"></div>' : ''}
      </div>
      <div class="timeline-content">
        <div class="timeline-phase">${phase.label}</div>
        <div class="timeline-tasks">${phase.tasks.map(t=>`• ${t}`).join('<br>')}</div>
      </div>
    </div>`;
  });
  area.innerHTML = html;
}

function renderVorlagen() {
  const area = document.getElementById('scroll-area');
  let html = `<div class="section-header">Aufgaben-Vorlagen</div>
    <div style="font-size:13px;color:var(--text-2);margin-bottom:12px;">Füge alle typischen Aufgaben einer Kategorie mit einem Klick hinzu.</div>
    <div class="template-grid">`;
  TEMPLATES.forEach(tpl => {
    const added = addedTemplates.includes(tpl.id);
    html += `<button class="template-card ${added?'added':''}" onclick="addTemplate('${tpl.id}')">
      <div class="template-icon">${tpl.icon}</div>
      <div class="template-name">${tpl.name}</div>
      <div class="template-count">${added?'✓ Hinzugefügt':tpl.tasks.length+' Aufgaben'}</div>
    </button>`;
  });
  html += `</div>`;
  area.innerHTML = html;
}

function renderEinstellungen() {
  const area = document.getElementById('scroll-area');
  let html = `<div class="section-header">Einstellungen</div>
    <div class="settings-row">
      <div><div class="settings-label">Hochzeitsdatum</div><div class="settings-sub">Für Countdown & Zeitplan</div></div>
      <div>
        <input type="date" id="wedding-date-input" value="${weddingDate}" style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border-mid);background:var(--bg);color:var(--rose);font-family:DM Sans,sans-serif;" onchange="setWeddingDate(this.value)" />
      </div>
    </div>
    <div class="settings-row">
      <div><div class="settings-label">Aufgaben gesamt</div></div>
      <div class="settings-val">${tasks.length}</div>
    </div>
    <div class="settings-row">
      <div><div class="settings-label">Erledigt</div></div>
      <div class="settings-val" style="color:var(--sage)">${tasks.filter(t=>t.done).length} von ${tasks.length}</div>
    </div>
    <div class="section-header" style="margin-top:16px;">Über die App</div>
    <div class="settings-row"><div><div class="settings-label">Version</div><div class="settings-sub">Hochzeitsplaner PWA v2.0</div></div></div>
    <button class="danger-btn" onclick="if(confirm('Alle Daten löschen?')){localStorage.clear();location.reload();}">🗑 Alle Daten zurücksetzen</button>`;
  area.innerHTML = html;
}

function render() {
  updateStats();
  if (activeTab==='aufgaben') renderAufgaben();
  else if (activeTab==='zeitplan') renderZeitplan();
  else if (activeTab==='vorlagen') renderVorlagen();
  else renderEinstellungen();
}

function toggle(id) {
  const t = tasks.find(x=>x.id===id);
  if(t){t.done=!t.done; save(); render();}
}

function setWeddingDate(val) {
  weddingDate = val; save(); render();
}

function addTemplate(id) {
  if (addedTemplates.includes(id)) return;
  const tpl = TEMPLATES.find(t=>t.id===id);
  if (!tpl) return;
  tpl.tasks.forEach(title => {
    tasks.push({ id:nextId++, title, person:'', cat:tpl.name==='Deko'?'Dekoration':tpl.name, prio:'mittel', due:'', done:false });
  });
  addedTemplates.push(id);
  save(); render();
}

// Tabs
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    const showFilters = activeTab === 'aufgaben';
    document.getElementById('filters-bar').style.display = showFilters ? 'flex' : 'none';
    render();
  });
});

// Filters
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.f;
    render();
  });
});

// Modal
const modalBg = document.getElementById('modal-bg');
document.getElementById('open-modal').addEventListener('click', () => { modalBg.classList.add('open'); setTimeout(()=>document.getElementById('f-title').focus(),300); });
const closeModal = () => modalBg.classList.remove('open');
document.getElementById('close-modal').addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if(e.target===modalBg) closeModal(); });
document.getElementById('save-task').addEventListener('click', () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  tasks.push({ id:nextId++, title, person:document.getElementById('f-person').value.trim(), cat:document.getElementById('f-cat').value, prio:document.getElementById('f-prio').value, due:document.getElementById('f-due').value, done:false });
  save(); render(); closeModal();
  document.getElementById('f-title').value='';
  document.getElementById('f-person').value='';
  document.getElementById('f-due').value='';
});

render();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
