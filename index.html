<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#c2185b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Luisa & Nico"/>
  <title>Hochzeit Luisa & Nico</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rose:#c2185b;--rose-l:#fce4ec;--rose-d:#880e4f;
      --sage:#4caf50;--sage-l:#e8f5e9;
      --amber:#f59e0b;--amber-l:#fffbeb;
      --red:#ef4444;--red-l:#fef2f2;
      --blue-l:#eff6ff;
      --bg:#fdfaf8;--sur:#fff;
      --br:rgba(0,0,0,0.08);--brm:rgba(0,0,0,0.14);
      --t:#1a1a1a;--t2:#555;--t3:#888;
      --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);display:flex;flex-direction:column;height:100dvh}
    #auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:none;align-items:center;justify-content:center;padding:1rem}
    #auth-overlay.open{display:flex}
    .a-sheet{width:100%;max-width:400px;background:var(--sur);border-radius:20px;padding:0 20px 24px;max-height:90dvh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .a-handle{width:36px;height:4px;border-radius:2px;background:var(--brm);margin:16px auto 20px}
    .a-logo{text-align:center;margin-bottom:20px}
    .a-logo .ico{font-size:40px}
    .a-logo h2{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-top:6px}
    .a-tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--br)}
    .a-tab{flex:1;text-align:center;padding:8px;font-size:14px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
    .a-tab.on{color:var(--rose);border-bottom-color:var(--rose);font-weight:500}
    .a-inp{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--brm);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--t);margin-bottom:10px;-webkit-appearance:none}
    .a-inp:focus{outline:2px solid var(--rose);border-color:transparent}
    .btn-p{width:100%;padding:13px;border-radius:12px;border:none;background:var(--rose);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px}
    .btn-g{width:100%;padding:12px;border-radius:12px;border:1px solid var(--brm);background:var(--sur);color:var(--t);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
    .a-div{text-align:center;font-size:12px;color:var(--t3);margin:4px 0 10px}
    .a-err{font-size:13px;color:var(--red);min-height:18px;margin-bottom:8px;text-align:center}
    #name-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9998;display:none;align-items:center;justify-content:center;padding:1rem}
    #name-overlay.open{display:flex}
    .name-sheet{width:100%;max-width:360px;background:var(--sur);border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .name-sheet h2{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:6px}
    .name-sheet p{font-size:13px;color:var(--t3);margin-bottom:20px}
    .hdr{background:var(--rose);padding:calc(var(--st)+12px) 16px 0;flex-shrink:0}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .hdr h1{font-family:'Lora',serif;font-size:20px;color:#fff;font-weight:600}
    .hdr-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px}
    .hdr-acts{display:flex;gap:8px;align-items:center}
    .ico-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .rbadge{font-size:11px;padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.2);color:#fff}
    .nav-tabs{display:flex;border-top:1px solid rgba(255,255,255,.2);overflow-x:auto;scrollbar-width:none}
    .nav-tabs::-webkit-scrollbar{display:none}
    .nav-tab{flex:1;min-width:fit-content;padding:10px 8px;text-align:center;font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .nav-tab.on{color:#fff;border-bottom-color:#fff}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--sur);border-bottom:1px solid var(--br);flex-shrink:0}
    .stat{padding:9px 4px;text-align:center;border-right:1px solid var(--br)}
    .stat:last-child{border-right:none}
    .sv{font-size:19px;font-weight:500}
    .sv.rose{color:var(--rose)}.sv.grn{color:var(--sage)}.sv.amb{color:var(--amber)}
    .sl{font-size:10px;color:var(--t3);margin-top:1px;text-transform:uppercase;letter-spacing:.4px}
    .filters{display:flex;gap:6px;padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--br);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .fb{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border-radius:999px;white-space:nowrap;border:1px solid var(--brm);background:var(--sur);color:var(--t2);cursor:pointer;transition:all .15s;flex-shrink:0}
    .fb.on{background:var(--rose);color:#fff;border-color:var(--rose)}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(var(--sb)+10px)}
    .alert{border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
    .alert.warn{background:var(--amber-l);border:1px solid #fcd34d}
    .alert.info{background:var(--blue-l);border:1px solid #93c5fd}
    .aico{font-size:18px;flex-shrink:0;margin-top:1px}
    .atxt{font-size:13px;line-height:1.45}
    .atxt strong{font-weight:500;display:block;margin-bottom:2px}
    .cdown{background:linear-gradient(135deg,var(--rose),#ad1457);border-radius:0;padding:16px 14px;margin:0 -14px 10px;color:#fff;display:flex;align-items:center;justify-content:space-between}
    .cl p{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.5px}
    .cl h3{font-family:'Lora',serif;font-size:17px;margin-top:2px}
    .cl .dt{font-size:13px;opacity:.85;margin-top:3px}
    .cr{text-align:right}
    .cr .num{font-family:'Lora',serif;font-size:44px;font-weight:600;line-height:1}
    .cr .lbl{font-size:11px;opacity:.8}
    .prog-card{background:var(--sur);border:1px solid var(--br);border-radius:14px;padding:14px;margin-bottom:10px}
    .prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .prog-hdr span{font-size:13px;color:var(--t2)}
    .prog-hdr strong{font-size:15px;font-weight:500}
    .prog-bar{height:8px;background:var(--br);border-radius:999px;overflow:hidden}
    .prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#f48fb1,var(--rose));transition:width .5s}
    .motiv{font-size:13px;color:var(--rose-d);margin-top:8px;font-style:italic}
    .info-card{background:var(--sur);border:1px solid var(--br);border-radius:14px;padding:16px;margin-bottom:12px}
    .info-card h3{font-size:15px;font-weight:500;margin-bottom:12px}
    .irow{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--br);font-size:14px}
    .iico{font-size:18px;flex-shrink:0}
    .tc{background:var(--sur);border-radius:14px;border:1px solid var(--br);padding:12px 14px;margin-bottom:8px}
    .tc.done{opacity:.45}
    .tc-top{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:start}
    .chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--brm);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:1px}
    .chk.done{background:var(--sage);border-color:var(--sage)}
    .chk-ico{display:none}
    .chk.done .chk-ico{display:block}
    .chk-ico svg{width:13px;height:13px}
    .tt{font-size:14px;font-weight:500;color:var(--t);line-height:1.35}
    .tc.done .tt{text-decoration:line-through}
    .tm{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
    .chip{font-size:11px;padding:2px 8px;border-radius:999px}
    .chip.per{background:var(--rose-l);color:var(--rose-d);font-weight:500}
    .chip.cat{background:#f1f5f9;color:#475569}
    .chip.due{background:transparent;color:var(--t3);padding-left:0}
    .chip.due.late{color:var(--red);font-weight:500}
    .chip.due.soon{color:var(--amber);font-weight:500}
    .chip.cost{background:var(--sage-l);color:#166534}
    .pdot{width:7px;height:7px;border-radius:50%;margin-top:9px;flex-shrink:0}
    .pdot.hoch{background:var(--red)}.pdot.mittel{background:var(--amber)}.pdot.niedrig{background:var(--sage)}
    .tc-extra{margin-top:10px;padding-top:10px;border-top:1px solid var(--br)}
    .comment{font-size:13px;color:var(--t2);padding:5px 0;border-bottom:1px solid var(--br);display:flex;gap:8px}
    .comment:last-of-type{border-bottom:none}
    .c-auth{font-weight:500;color:var(--t);flex-shrink:0}
    .c-inp-row{display:flex;gap:8px;margin-top:8px}
    .c-inp{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--brm);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t)}
    .c-inp:focus{outline:2px solid var(--rose);border-color:transparent}
    .c-send{padding:8px 14px;border-radius:10px;border:none;background:var(--rose);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;flex-shrink:0}
    .tc-toggle{font-size:12px;color:var(--rose);cursor:pointer;margin-top:6px;display:inline-block}
    .assignee-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
    .aschip{font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--brm);background:var(--bg);color:var(--t2);cursor:pointer;transition:all .15s}
    .aschip.on{background:var(--rose-l);color:var(--rose-d);border-color:var(--rose)}
    .sh{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px}
    .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .tpl-card{background:var(--sur);border:1px solid var(--br);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s;text-align:left}
    .tpl-ico{font-size:22px;margin-bottom:6px}
    .tpl-name{font-size:13px;font-weight:500;color:var(--t)}
    .tpl-cnt{font-size:11px;color:var(--t3);margin-top:2px}
    .tpl-card.added{border-color:var(--sage);background:var(--sage-l)}
    .tpl-card.added .tpl-name{color:#166534}
    .tl-item{display:flex;gap:12px;margin-bottom:14px}
    .tl-l{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:40px}
    .tl-dot{width:12px;height:12px;border-radius:50%;background:var(--rose);flex-shrink:0;margin-top:3px}
    .tl-dot.done{background:var(--sage)}.tl-dot.fut{background:var(--brm)}
    .tl-line{width:2px;flex:1;background:var(--br);margin-top:4px}
    .tl-c{flex:1;padding-bottom:6px}
    .tl-ph{font-size:12px;font-weight:500;color:var(--rose-d);margin-bottom:4px}
    .tl-ts{font-size:13px;color:var(--t2);line-height:1.5}
    /* BUDGET */
    .b-hero{background:var(--sur);border:1px solid var(--br);border-radius:14px;padding:16px;margin-bottom:12px}
    .b-hero h3{font-size:15px;font-weight:500;margin-bottom:12px}
    .b-totals{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .b-num{background:var(--bg);border-radius:10px;padding:10px;text-align:center}
    .b-val{font-size:16px;font-weight:500}
    .b-val.ok{color:var(--sage)}.b-val.warn{color:var(--amber)}.b-val.over{color:var(--red)}
    .b-lbl{font-size:10px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
    .bpbar{height:10px;background:var(--br);border-radius:999px;overflow:hidden;margin-bottom:14px}
    .bpfill{height:100%;border-radius:999px;transition:width .5s}
    .bpfill.ok{background:linear-gradient(90deg,var(--sage),#2e7d32)}
    .bpfill.warn{background:linear-gradient(90deg,var(--amber),#f57c00)}
    .bpfill.over{background:linear-gradient(90deg,var(--red),#b71c1c)}
    .b-cat{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--br);font-size:13px}
    .b-cat-n{color:var(--t2)}
    .b-cat-v{display:flex;gap:12px}
    .b-plan{color:var(--t3)}
    .b-act{font-weight:500}
    .b-act.over{color:var(--red)}.b-act.ok{color:var(--sage)}
    /* USERS */
    .uc{background:var(--sur);border:1px solid var(--br);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
    .uav{width:38px;height:38px;border-radius:50%;background:var(--rose-l);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:var(--rose-d);flex-shrink:0}
    .un{font-size:14px;font-weight:500}
    .ue{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rsel{font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--brm);background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;-webkit-appearance:none}
    .empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:15px}
    .ei{font-size:36px;margin-bottom:8px}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-bg.open{opacity:1;pointer-events:all}
    .modal{width:100%;background:var(--sur);border-radius:20px 20px 0 0;padding:0 16px calc(var(--sb)+20px);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);max-height:92dvh;overflow-y:auto}
    .modal-bg.open .modal{transform:translateY(0)}
    .m-handle{width:36px;height:4px;border-radius:2px;background:var(--brm);margin:12px auto 16px}
    .modal h2{font-family:'Lora',serif;font-size:18px;font-weight:600;margin-bottom:16px}
    .fg{margin-bottom:13px}
    .fg label{font-size:11px;color:var(--t3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
    .fg input,.fg select{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--brm);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--t);-webkit-appearance:none;appearance:none}
    .fg input:focus,.fg select:focus{outline:2px solid var(--rose);border-color:transparent}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .m-foot{display:flex;gap:10px;margin-top:8px}
    .btn-c{flex:1;padding:13px;border-radius:12px;border:1px solid var(--brm);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--t2);cursor:pointer}
    .btn-s{flex:2;padding:13px;border-radius:12px;border:none;background:var(--rose);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;cursor:pointer}
    .srow{background:var(--sur);border:1px solid var(--br);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .slbl{font-size:14px;font-weight:500}
    .ssub{font-size:12px;color:var(--t3);margin-top:2px}
    .sval{font-size:13px;color:var(--rose);font-weight:500;flex-shrink:0}
    .sinp{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--brm);background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--t);-webkit-appearance:none}
    .dbtn{width:100%;padding:13px;border-radius:12px;border:1px solid #fca5a5;background:var(--red-l);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--red);cursor:pointer;margin-top:8px}
  </style>
</head>
<body>

<!-- AUTH MODAL -->
<div id="auth-overlay">
  <div class="a-sheet">
    <div class="a-handle"></div>
    <div class="a-logo"><div class="ico">💍</div><h2>Anmelden</h2></div>
    <div class="a-tabs">
      <div class="a-tab on" onclick="switchTab('login')">Anmelden</div>
      <div class="a-tab" onclick="switchTab('register')">Registrieren</div>
    </div>
    <div id="a-err" class="a-err"></div>
    <input type="email" id="a-email" class="a-inp" placeholder="E-Mail Adresse"/>
    <input type="password" id="a-pw" class="a-inp" placeholder="Passwort" onkeydown="if(event.key==='Enter')doAuth()"/>
    <button class="btn-p" onclick="doAuth()" id="a-btn">Anmelden</button>
    <div class="a-div">oder</div>
    <button class="btn-g" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Mit Google anmelden
    </button>
  </div>
</div>

<!-- NAME MODAL -->
<div id="name-overlay">
  <div class="name-sheet">
    <h2>👋 Willkommen!</h2>
    <p>Wie lautet dein Vorname? Er wird bei Aufgaben und Kommentaren angezeigt.</p>
    <input type="text" id="name-inp" class="a-inp" placeholder="Dein Vorname" onkeydown="if(event.key==='Enter')saveName()"/>
    <button class="btn-p" onclick="saveName()">Speichern</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:flex;flex-direction:column;height:100dvh">
  <div class="hdr">
    <div class="hdr-top">
      <div><h1>💍 Luisa & Nico</h1><div class="hdr-sub" id="h-sub">Hochzeit 2026</div></div>
      <div class="hdr-acts">
        <div id="sync" style="width:8px;height:8px;border-radius:50%;background:var(--brm);flex-shrink:0;display:none"></div>
        <span class="rbadge" id="rbadge" style="display:none"></span>
        <button class="ico-btn" id="add-btn" style="display:none">＋</button>
        <button class="ico-btn" id="login-btn" onclick="openAuth()">👤</button>
        <button class="ico-btn" id="logout-btn" onclick="doLogout()" style="display:none">↩</button>
      </div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab on" data-tab="home">🏠 Home</div>
      <div class="nav-tab" data-tab="aufgaben" id="tab-aufgaben" style="display:none">✅ Aufgaben</div>
      <div class="nav-tab" id="tab-zeitplan" data-tab="zeitplan" style="display:none">📅 Zeitplan</div>
      <div class="nav-tab" data-tab="vorlagen" id="tab-vorlagen" style="display:none">📋 Vorlagen</div>
      <div class="nav-tab" data-tab="budget" id="tab-budget" style="display:none">💶 Budget</div>
      <div class="nav-tab" data-tab="nutzer" id="tab-nutzer" style="display:none">👥 Nutzer</div>
      <div class="nav-tab" data-tab="info" id="tab-info" style="display:none">⚙️ Info</div>
    </div>
  </div>
  <div class="stats" id="stats-bar" style="display:none">
    <div class="stat"><div class="sv" id="s-tot">0</div><div class="sl">Gesamt</div></div>
    <div class="stat"><div class="sv grn" id="s-don">0</div><div class="sl">Erledigt</div></div>
    <div class="stat"><div class="sv rose" id="s-opn">0</div><div class="sl">Offen</div></div>
    <div class="stat"><div class="sv amb" id="s-lat">0</div><div class="sl">Überfällig</div></div>
  </div>

function renderAufgaben(){
  const a=document.getElementById('scroll');
  const isA=role==='admin';
  let h='';
  const tot=tasks.length,don=tasks.filter(t=>t.done).length,pct=tot?Math.round(don/tot*100):0;
  h+=`<div class="prog-card"><div class="prog-hdr"><span>Fortschritt</span><strong>${pct}% erledigt</strong></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="motiv">${motiv(pct)}</div></div>`;
  const late=tasks.filter(t=>!t.done&&t.due&&t.due<today);
  const week=tasks.filter(t=>{if(t.done||!t.due)return false;const d=dl(t.due);return d>=0&&d<=7;});
  if(late.length)h+=`<div class="alert warn"><div class="aico">⚠️</div><div class="atxt"><strong>${late.length} Aufgabe${late.length>1?'n':''} überfällig!</strong>${late.map(t=>t.title).join(', ')}</div></div>`;
  else if(week.length)h+=`<div class="alert info"><div class="aico">📌</div><div class="atxt"><strong>${week.length} diese Woche fällig</strong>${week.slice(0,3).map(t=>t.title).join(', ')}</div></div>`;

  let vis=tasks;
  if(flt==='offen')vis=tasks.filter(t=>!t.done);
  else if(flt==='erledigt')vis=tasks.filter(t=>t.done);
  else if(flt==='hoch')vis=tasks.filter(t=>t.prio==='hoch'&&!t.done);
  else if(flt==='woche')vis=tasks.filter(t=>{if(t.done||!t.due)return false;const d=dl(t.due);return d>=0&&d<=7;});
  else if(flt==='meine')vis=tasks.filter(t=>isAssigned(t));

  if(!vis.length){h+=`<div class="empty"><div class="ei">🌸</div>Keine Aufgaben gefunden.</div>`;}
  else h+=vis.map(t=>{
    const late=!t.done&&t.due&&t.due<today;
    const d=t.due?dl(t.due):null;
    const soon=!late&&d!==null&&d<=7&&d>=0;
    const lbl=t.due?(late?`⚠ ${fmt(t.due)}`:(soon?`in ${d}d`:fmt(t.due))):'';
    const assigned=isAssigned(t);
    const canChk=isA||assigned;
    const showCost=isA||(assigned&&(t.costPlan||t.costActual));
    const comments=t.comments||[];
    const assigneeNames=(t.assignees||[]).join(', ');
    return`<div class="tc ${t.done?'done':''}">
      <div class="tc-top">
        <button class="chk ${t.done?'done':''}" ${canChk?`onclick="tog(${t.id})"`:' disabled style="opacity:.4;cursor:default"'}>
          <span class="chk-ico"><svg viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </button>
        <div>
          <div class="tt">${t.title}</div>
          <div class="tm">
            ${assigneeNames?`<span class="chip per">${assigneeNames}</span>`:''}
            <span class="chip cat">${t.cat}</span>
            ${t.due?`<span class="chip due ${late?'late':soon?'soon':''}">${lbl}</span>`:''}
            ${showCost&&t.costActual?`<span class="chip cost">${eur(t.costActual)}</span>`:''}
            ${t.due&&!t.done?`<span class="chip" onclick="cal(${t.id})" style="cursor:pointer;background:#EAF3DE;color:#27500A">📅</span>`:''}
            ${isA?`<span class="chip" onclick="editTask(${t.id})" style="cursor:pointer;background:var(--blue-l);color:#1e40af">✏️</span>`:''}
            ${isA?`<span class="chip" onclick="delTask(${t.id})" style="cursor:pointer;background:var(--red-l);color:var(--red)">✕</span>`:''}
          </div>
          <span class="tc-toggle" onclick="toggleExtra(${t.id})">💬 ${comments.length>0?comments.length+' Kommentar'+(comments.length>1?'e':''):'Kommentar'}</span>
        </div>
        <div class="pdot ${t.prio}"></div>
      </div>
      <div class="tc-extra" id="extra-${t.id}" style="display:none">
        ${comments.map(c=>`<div class="comment"><span class="c-auth">${c.author}:</span><span>${c.text}</span></div>`).join('')}
        <div class="c-inp-row">
          <input class="c-inp" id="cinp-${t.id}" placeholder="Kommentar..." onkeydown="if(event.key==='Enter')addComment(${t.id})"/>
          <button class="c-send" onclick="addComment(${t.id})">Senden</button>
        </div>
      </div>
    </div>`;
  }).join('');
  a.innerHTML=h;
  stats();
}

function renderVorlagen(){

function renderBudget(){
  const a=document.getElementById('scroll');
  const cats=['Location','Catering','Dekoration','Musik','Fotografie','Kleidung','Einladungen','Flitterwochen','Sonstiges'];
  const totalPlan=cats.reduce((s,cat)=>s+(catBudget[cat]||0),0);
  const totalAct=tasks.reduce((s,t)=>s+(t.costActual||0),0);
  const remaining=totalBudget-(totalAct||totalPlan);
  const base=totalBudget||totalPlan||1;
  const pct=Math.min(Math.round((totalAct||totalPlan)/base*100),100);
  const cls=totalAct>totalBudget&&totalBudget>0?'over':pct>=80?'warn':'ok';
  let h=`<div class="b-hero"><h3>💶 Budgetübersicht</h3>
    <div class="b-totals">
      <div class="b-num"><div class="b-val">${eur(totalBudget||totalPlan)}</div><div class="b-lbl">Gesamtbudget</div></div>
      <div class="b-num"><div class="b-val ${totalAct>(totalBudget||totalPlan)?'over':'ok'}">${eur(totalAct)}</div><div class="b-lbl">Ausgegeben</div></div>
      <div class="b-num"><div class="b-val ${remaining<0?'over':'ok'}">${eur(Math.max(remaining,0))}</div><div class="b-lbl">Verfügbar</div></div>
    </div>
    <div class="bpbar"><div class="bpfill ${cls}" style="width:${pct}%"></div></div>
  </div>`;
  h+=`<div class="srow" style="margin-bottom:16px"><div><div class="slbl">Gesamtbudget</div><div class="ssub">Obere Grenze für alle Kosten</div></div><div style="display:flex;align-items:center;gap:8px"><input type="number" class="sinp" id="budget-inp" value="${totalBudget||''}" placeholder="z.B. 15000" style="width:120px" onchange="setBudget(this.value)"/><span style="font-size:13px;color:var(--t3)">€</span></div></div>`;
  h+=`<div class="sh">Plankosten pro Kategorie</div>`;
  h+=`<div style="background:var(--sur);border:1px solid var(--br);border-radius:14px;overflow:hidden;margin-bottom:12px">`;
  cats.forEach((cat,i)=>{
    const plan=catBudget[cat]||0;
    const act=tasks.filter(t=>t.cat===cat).reduce((s,t)=>s+(t.costActual||0),0);
    const over=act>plan&&plan>0;
    const diff=plan-act;
    h+=`<div style="padding:12px 14px;${i>0?'border-top:1px solid var(--br)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:500">${cat}</span>
        <span style="font-size:12px;color:${over?'var(--red)':act>0?'var(--sage)':'var(--t3)'}">${act>0?`${eur(act)} ausgegeben`:''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" class="sinp" placeholder="Plankosten" value="${plan||''}" style="flex:1;font-size:13px;padding:7px 10px" onchange="setCatBudget('${cat}',this.value)"/>
        <span style="font-size:12px;color:var(--t3);flex-shrink:0">€ geplant</span>
        ${plan>0?`<span style="font-size:12px;font-weight:500;color:${diff<0?'var(--red)':'var(--sage)'};flex-shrink:0">${diff>=0?'-'+eur(diff):'⚠ +'+eur(Math.abs(diff))}</span>`:''}
      </div>
    </div>`;
  });
  h+=`</div>`;
  a.innerHTML=h;
}

  a.innerHTML=h;
  try{const s=await getDoc(ID);if(s.exists()){const d=s.data();
    ['si-loc','si-time','si-dress'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.value=[d.location,d.time,d.dresscode][i]||'';});
  }}catch(e){}
}

function render(){
  updateUI();
  document.getElementById('fbar').style.display=(tab==='aufgaben'&&(role==='admin'||role==='mithelfer'))?'flex':'none';
  if(tab==='home')renderHome();
  else if(tab==='aufgaben')renderAufgaben();
  else if(tab==='zeitplan')renderZeitplan();
  else if(tab==='vorlagen')renderVorlagen();
  else if(tab==='budget')renderBudget();
  else if(tab==='nutzer')renderNutzer();
  else renderInfo();
}

// ACTIONS
window.tog=async function(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;await save();render();}};
window.delTask=async function(id){if(!confirm('Aufgabe löschen?'))return;tasks=tasks.filter(t=>t.id!==id);await save();render();};
window.setWDate=async function(v){wDate=v;await save();render();};
window.saveInfo=async function(){
  const g=id=>document.getElementById(id)?.value||'';
  await setDoc(ID,{location:g('si-loc'),time:g('si-time'),dresscode:g('si-dress')});
};
window.setBudget=async function(v){
  totalBudget=parseFloat(v)||0;
  await setDoc(BD,{total:totalBudget,catBudget});
  render();
};
window.setCatBudget=async function(cat,v){
  catBudget[cat]=parseFloat(v)||0;
  await setDoc(BD,{total:totalBudget,catBudget});
  render();
};
window.addTpl=async function(id){
  if(tmpls.includes(id))return;
  const tpl=TPLS.find(t=>t.id===id);if(!tpl)return;
  tpl.ts.forEach(title=>tasks.push({id:nid++,title,assignees:[],cat:tpl.name,prio:'mittel',due:'',done:false,comments:[],costPlan:0,costActual:0}));
  tmpls.push(id);await save();render();
};
window.setRole=async function(uid,r){await updateDoc(doc(db,'users',uid),{role:r});await loadUsers();};
window.cal=function(id){
  const t=tasks.find(x=>x.id===id);if(!t||!t.due)return;
  const[y,m,d]=t.due.split('-');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART;VALUE=DATE:${y}${m}${d}`,`DTEND;VALUE=DATE:${y}${m}${d}`,`SUMMARY:💍 ${t.title}`,'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download=`${t.title.replace(/[^a-z0-9]/gi,'_')}.ics`;a.click();
};
window.toggleExtra=function(id){const el=document.getElementById(`extra-${id}`);if(el)el.style.display=el.style.display==='none'?'block':'none';};
window.addComment=async function(id){
  const inp=document.getElementById(`cinp-${id}`);
  const text=inp?.value.trim();if(!text)return;
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(!t.comments)t.comments=[];
  t.comments.push({author:firstName||'Unbekannt',text,ts:Date.now()});
  inp.value='';await save();
  const ex=document.getElementById(`extra-${id}`);
  if(ex){const inpRow=ex.querySelector('.c-inp-row');const div=document.createElement('div');div.className='comment';div.innerHTML=`<span class="c-auth">${t.comments[t.comments.length-1].author}:</span><span>${text}</span>`;ex.insertBefore(div,inpRow);}
};

// TASK MODAL
let editingId=null;
window.editTask=function(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editingId=id;
  document.getElementById('modal-title').textContent='Aufgabe bearbeiten';
  document.getElementById('f-ttl').value=t.title;
  document.getElementById('f-cat').value=t.cat;
  document.getElementById('f-pri').value=t.prio;
  document.getElementById('f-due').value=t.due||'';
  document.getElementById('f-act').value=t.costActual||'';
  selectedAssignees=[...(t.assignees||[])];
  buildAssigneeGrid();
  document.getElementById('modal-bg').classList.add('open');
};

function buildAssigneeGrid(){
  const grid=document.getElementById('assignee-grid');
  const helpers=allUsers.filter(u=>u.firstName);
  if(!helpers.length){grid.innerHTML=`<span style="font-size:13px;color:var(--t3)">Noch keine Mithelfer registriert</span>`;return;}
  grid.innerHTML=helpers.map(u=>`<button class="aschip ${selectedAssignees.includes(u.firstName)?'on':''}" onclick="toggleAssignee('${u.firstName}')">${u.firstName}</button>`).join('');
}

window.toggleAssignee=function(name){
  const idx=selectedAssignees.indexOf(name);
  if(idx>-1)selectedAssignees.splice(idx,1);else selectedAssignees.push(name);
  buildAssigneeGrid();
};

const mb=document.getElementById('modal-bg');
document.getElementById('add-btn').addEventListener('click',()=>{
  editingId=null;
  document.getElementById('modal-title').textContent='Neue Aufgabe';
  document.getElementById('f-ttl').value='';
  document.getElementById('f-cat').value='Location';
  document.getElementById('f-pri').value='mittel';
  document.getElementById('f-due').value='';
  document.getElementById('f-plan').value='';
  document.getElementById('f-act').value='';
  selectedAssignees=[];
  buildAssigneeGrid();
  mb.classList.add('open');
  setTimeout(()=>document.getElementById('f-ttl').focus(),300);
});
const cm=()=>{mb.classList.remove('open');editingId=null;};
document.getElementById('close-m').addEventListener('click',cm);
mb.addEventListener('click',e=>{if(e.target===mb)cm();});
document.getElementById('save-m').addEventListener('click',async()=>{
  const ttl=document.getElementById('f-ttl').value.trim();if(!ttl){document.getElementById('f-ttl').focus();return;}
  const data={title:ttl,assignees:[...selectedAssignees],cat:document.getElementById('f-cat').value,prio:document.getElementById('f-pri').value,due:document.getElementById('f-due').value,costActual:parseFloat(document.getElementById('f-act').value)||0};
  if(editingId){const t=tasks.find(x=>x.id===editingId);if(t)Object.assign(t,data);}
  else{tasks.push({id:nid++,...data,done:false,comments:[]});}
  await save();render();cm();
});

// AUTH
window.openAuth=function(){document.getElementById('auth-overlay').classList.add('open');};
const closeAuth=()=>document.getElementById('auth-overlay').classList.remove('open');
document.getElementById('auth-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('auth-overlay'))closeAuth();});
window.switchTab=function(m){
  document.querySelectorAll('.a-tab').forEach((t,i)=>t.classList.toggle('on',(m==='login'&&i===0)||(m==='register'&&i===1)));
  document.getElementById('a-btn').textContent=m==='login'?'Anmelden':'Registrieren';
  window._am=m;
};
window._am='login';
window.doAuth=async function(){
  const email=document.getElementById('a-email').value.trim(),pw=document.getElementById('a-pw').value;
  const err=document.getElementById('a-err');err.textContent='';
  try{if(window._am==='login')await signInWithEmailAndPassword(auth,email,pw);else await createUserWithEmailAndPassword(auth,email,pw);closeAuth();}
  catch(e){const m={'auth/invalid-credential':'Falsche E-Mail oder Passwort.','auth/email-already-in-use':'E-Mail bereits registriert.','auth/weak-password':'Passwort mind. 6 Zeichen.','auth/invalid-email':'Ungültige E-Mail.'};err.textContent=m[e.code]||'Fehler: '+e.message;}
};
window.doGoogle=async function(){try{await signInWithPopup(auth,gp);closeAuth();}catch(e){document.getElementById('a-err').textContent='Google Login fehlgeschlagen.';}};
window.doLogout=async function(){await signOut(auth);user=null;role='gast';firstName='';tab='home';render();};
window.saveName=async function(){
  const n=document.getElementById('name-inp').value.trim();if(!n)return;
  firstName=n;
  await updateDoc(doc(db,'users',user.uid),{firstName:n});
  document.getElementById('name-overlay').classList.remove('open');
  render();
};

onAuthStateChanged(auth,async(u)=>{
  if(u){
    user=u;
    const uref=doc(db,'users',u.uid);
    const usnap=await getDoc(uref);
    if(!usnap.exists()){await setDoc(uref,{email:u.email,name:u.displayName||'',role:'gast',createdAt:Date.now()});role='gast';firstName='';}
    else{const d=usnap.data();role=d.role||'gast';firstName=d.firstName||d.name||'';}
    if((role==='admin'||role==='mithelfer')&&!firstName){
      document.getElementById('name-overlay').classList.add('open');
    }
    if(role==='admin'||role==='mithelfer'){
      document.getElementById('sync').style.background='#f59e0b';
      await loadUsers();
      try{const bs=await getDoc(BD);if(bs.exists()){totalBudget=bs.data().total||0;catBudget=bs.data().catBudget||{};}}catch(e){}
      onSnapshot(DD,(snap)=>{
        if(snap.exists()){const d=snap.data();tasks=d.tasks||DEFS;wDate=d.weddingDate||'';tmpls=d.templates||[];nid=tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;document.getElementById('sync').style.background='#4caf50';render();}
        else{tasks=DEFS;save();}
      });
      if(tab==='home')tab='aufgaben';
    }
    render();
  }else{user=null;role='gast';firstName='';}
});

document.querySelectorAll('.nav-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');tab=t.dataset.tab;render();});});
document.querySelectorAll('.fb').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');flt=b.dataset.f;render();});});

async function loadPublicData(){try{const s=await getDoc(DD);if(s.exists()&&s.data().weddingDate)wDate=s.data().weddingDate;}catch(e){}}
await loadPublicData();
render();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
