<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Luisa & Nico"/>
  <title>Hochzeit Luisa & Nico</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link rel="manifest" href="manifest.json"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rose:#e91e8c;--rose-l:#fce4ec;--rose-d:#880e4f;
      --sage:#34c759;--sage-l:#e8f5e9;
      --amber:#ff9500;--amber-l:#fff3e0;
      --red:#ff3b30;--red-l:#fff1f0;
      --blue:#007aff;--blue-l:#e8f0fe;
      --bg:#f2f2f7;--sur:#ffffff;--sur2:#f9f9f9;
      --br:rgba(0,0,0,0.10);--brm:rgba(0,0,0,0.16);
      --t:#000000;--t2:#3c3c43;--t3:#8e8e93;
      --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
      --sl:env(safe-area-inset-left,0px);
      --sidebar-w:240px;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--t);display:flex;height:100dvh}

    /* ── OVERLAYS ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9000;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .overlay.open{display:flex}
    .sheet{width:100%;max-width:420px;background:rgba(255,255,255,.95);border-radius:20px;padding:0 20px 24px;max-height:92dvh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.18)}
    .sh-handle{width:36px;height:5px;border-radius:3px;background:var(--brm);margin:12px auto 16px}

    /* ── AUTH ── */
    .a-logo{text-align:center;margin-bottom:16px}
    .a-logo .ico{font-size:44px}
    .a-logo h2{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.3px}
    .a-tabs{display:flex;background:rgba(120,120,128,.12);border-radius:10px;padding:2px;margin-bottom:16px}
    .a-tab{flex:1;text-align:center;padding:7px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-radius:8px;transition:all .2s}
    .a-tab.on{background:var(--sur);color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,.12)}
    .a-err{font-size:13px;color:var(--red);min-height:18px;margin-bottom:8px;text-align:center}

    /* ── INPUTS ── */
    .inp{width:100%;padding:12px 14px;border-radius:12px;border:none;background:rgba(120,120,128,.12);font-family:inherit;font-size:16px;color:var(--t);margin-bottom:10px;-webkit-appearance:none;outline:none;transition:background .15s}
    .inp:focus{background:rgba(120,120,128,.18)}
    select.inp{appearance:none;-webkit-appearance:none}
    .btn-rose{width:100%;padding:14px;border-radius:14px;border:none;background:var(--rose);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;letter-spacing:-.1px}
    .btn-out{width:100%;padding:13px;border-radius:14px;border:none;background:rgba(120,120,128,.12);color:var(--t);font-family:inherit;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
    .btn-ghost{flex:1;padding:14px;border-radius:14px;border:none;background:rgba(120,120,128,.12);font-family:inherit;font-size:16px;color:var(--t2);cursor:pointer}
    .btn-save{flex:2;padding:14px;border-radius:14px;border:none;background:var(--rose);font-family:inherit;font-size:16px;font-weight:600;color:#fff;cursor:pointer}
    .a-div{text-align:center;font-size:13px;color:var(--t3);margin:4px 0 10px}
    .fg{margin-bottom:12px}
    .fg label{font-size:13px;font-weight:500;color:var(--t3);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    .fg .inp{margin-bottom:0}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mfoot{display:flex;gap:10px;margin-top:12px}

    /* ── TASK POPUP ── */
    #task-popup .sheet{max-width:500px}
    .popup-title{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
    .popup-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .chip{font-size:12px;font-weight:500;padding:4px 10px;border-radius:8px}
    .chip.per{background:var(--rose-l);color:var(--rose-d)}
    .chip.cat{background:rgba(120,120,128,.12);color:var(--t2)}
    .chip.due{background:transparent;color:var(--t3);font-size:12px;padding-left:0}
    .chip.due.late{color:var(--red)}
    .chip.due.soon{color:var(--amber)}
    .chip.cost{background:var(--sage-l);color:#1b5e20}
    .chip.prio-hoch{background:var(--red-l);color:var(--red)}
    .chip.prio-mittel{background:var(--amber-l);color:#e65100}
    .chip.prio-niedrig{background:var(--sage-l);color:#1b5e20}
    .popup-section{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px}
    .assignee-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
    .aschip{font-size:14px;padding:7px 14px;border-radius:10px;border:none;background:rgba(120,120,128,.12);color:var(--t2);cursor:pointer;transition:all .15s;font-family:inherit}
    .aschip.on{background:var(--rose-l);color:var(--rose-d);font-weight:500}
    .comment-list{margin-bottom:10px}
    .comment{padding:8px 0;border-bottom:1px solid var(--br);font-size:14px;line-height:1.5}
    .comment:last-child{border-bottom:none}
    .c-author{font-weight:600;color:var(--t);margin-right:4px}
    .c-mention{color:var(--rose);font-weight:600}
    .c-time{font-size:11px;color:var(--t3);margin-left:6px}
    .c-inp-wrap{position:relative}
    .c-inp{width:100%;padding:11px 46px 11px 14px;border-radius:14px;border:none;background:rgba(120,120,128,.12);font-family:inherit;font-size:15px;color:var(--t);resize:none;outline:none}
    .c-inp:focus{background:rgba(120,120,128,.18)}
    .c-send{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;border:none;background:var(--rose);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .mention-hint{font-size:12px;color:var(--t3);margin-top:5px}
    .mention-suggestions{background:var(--sur);border-radius:12px;margin-top:4px;overflow:hidden;display:none;box-shadow:0 4px 20px rgba(0,0,0,.12)}
    .mention-opt{padding:11px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--br)}
    .mention-opt:last-child{border-bottom:none}
    .mention-opt:hover{background:var(--rose-l);color:var(--rose-d)}
    .popup-actions{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--br);flex-wrap:wrap}
    .act-btn{flex:1;min-width:80px;padding:10px 12px;border-radius:12px;border:none;background:rgba(120,120,128,.12);font-family:inherit;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;text-align:center}
    .act-btn.danger{background:var(--red-l);color:var(--red)}
    .act-btn.primary{background:var(--rose);color:#fff}

    /* ── DESKTOP SIDEBAR ── */
    @media(min-width:768px){
      body{flex-direction:row}
      #sidebar{
        width:var(--sidebar-w);min-width:var(--sidebar-w);
        height:100dvh;
        background:rgba(255,255,255,.85);
        backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
        border-right:1px solid var(--br);
        display:flex;flex-direction:column;
        padding:calc(var(--st)+20px) 12px 20px;
        flex-shrink:0;
        overflow:hidden;
      }
      .sidebar-brand{padding:8px 12px 20px;border-bottom:1px solid var(--br);margin-bottom:12px}
      .sidebar-brand h1{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--t);letter-spacing:-.2px}
      .sidebar-brand .sub{font-size:12px;color:var(--t3);margin-top:2px}
      .sidebar-nav{flex:1;display:flex;flex-direction:column;gap:2px}
      .s-tab{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
      .s-tab:hover{background:rgba(120,120,128,.1)}
      .s-tab.on{background:var(--rose-l);color:var(--rose-d)}
      .s-tab .s-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(120,120,128,.1);flex-shrink:0}
      .s-tab.on .s-ico{background:var(--rose);color:#fff}
      .sidebar-footer{padding-top:12px;border-top:1px solid var(--br)}
      .s-user{display:flex;align-items:center;gap:10px;padding:8px 12px}
      .s-avatar{width:32px;height:32px;border-radius:50%;background:var(--rose-l);color:var(--rose-d);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
      .s-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .s-role{font-size:11px;color:var(--t3)}
      .s-logout{width:28px;height:28px;border-radius:8px;border:none;background:rgba(120,120,128,.1);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
      /* Hide mobile header & bottom bar on desktop */
      #mobile-header{display:none!important}
      #main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    }

    /* ── MOBILE HEADER ── */
    @media(max-width:767px){
      #sidebar{display:none}
      #mobile-header{display:flex;flex-direction:column;flex-shrink:0}
      #main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
    }

    #mobile-header{
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--br);
      padding:calc(var(--st)+12px) 16px 0;
      flex-shrink:0;
    }
    .mhdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
    .mhdr-top h1{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--t);letter-spacing:-.2px}
    .mhdr-sub{font-size:12px;color:var(--t3);margin-top:1px}
    .mhdr-acts{display:flex;gap:8px;align-items:center}
    .hdr-btn{width:34px;height:34px;border-radius:50%;background:rgba(120,120,128,.1);border:none;color:var(--t2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative}
    .rbadge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px;background:rgba(120,120,128,.12);color:var(--t2)}
    .notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--red);display:none}

    /* ── STATS BAR ── */
    #stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--sur);border-bottom:1px solid var(--br);flex-shrink:0}
    .stat{padding:10px 4px;text-align:center;border-right:1px solid var(--br)}
    .stat:last-child{border-right:none}
    .sv{font-size:20px;font-weight:700;letter-spacing:-.5px}
    .sv.rose{color:var(--rose)}.sv.grn{color:var(--sage)}.sv.amb{color:var(--amber)}
    .sl{font-size:10px;color:var(--t3);margin-top:1px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}

    /* ── FILTER BAR ── */
    #fbar{display:flex;gap:6px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--br);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
    #fbar::-webkit-scrollbar{display:none}
    .fb{font-family:inherit;font-size:13px;font-weight:500;padding:6px 14px;border-radius:10px;white-space:nowrap;border:none;background:var(--sur);color:var(--t2);cursor:pointer;transition:all .15s;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .fb.on{background:var(--rose);color:#fff;box-shadow:0 2px 8px rgba(233,30,140,.3)}

    /* ── SCROLL AREA ── */
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(var(--sb)+14px)}

    /* ── MOBILE DRAWER ── */
    #drawer-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.35);
      z-index:4000;opacity:0;pointer-events:none;
      transition:opacity .25s;
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    }
    #drawer-overlay.open{opacity:1;pointer-events:all}
    #mobile-drawer{
      position:fixed;top:0;left:0;bottom:0;
      width:280px;
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      z-index:4001;
      display:flex;flex-direction:column;
      padding:calc(var(--st)+20px) 14px calc(var(--sb)+20px);
      transform:translateX(-100%);
      transition:transform .3s cubic-bezier(.32,1,.23,1);
      box-shadow:4px 0 40px rgba(0,0,0,.15);
    }
    #mobile-drawer.open{transform:translateX(0)}
    .drawer-brand{padding:0 8px 20px;border-bottom:1px solid var(--br);margin-bottom:12px}
    .drawer-brand h2{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--t);letter-spacing:-.2px}
    .drawer-brand .sub{font-size:12px;color:var(--t3);margin-top:2px}
    .drawer-nav{flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
    .d-tab{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;font-size:15px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
    .d-tab:hover{background:rgba(120,120,128,.08)}
    .d-tab.on{background:var(--rose-l);color:var(--rose-d)}
    .d-tab .d-ico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(120,120,128,.1);flex-shrink:0}
    .d-tab.on .d-ico{background:var(--rose);color:#fff}
    .drawer-footer{padding-top:14px;border-top:1px solid var(--br)}
    .d-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px}
    .d-avatar{width:36px;height:36px;border-radius:50%;background:var(--rose-l);color:var(--rose-d);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
    .d-name{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .d-role{font-size:11px;color:var(--t3)}
    .d-logout{width:32px;height:32px;border-radius:10px;border:none;background:rgba(120,120,128,.1);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    @media(min-width:768px){
      #drawer-overlay,#mobile-drawer{display:none!important}
    }
    /* hamburger button */
    .hamburger{display:flex;flex-direction:column;gap:4px;justify-content:center;align-items:center;width:34px;height:34px;border-radius:10px;border:none;background:rgba(120,120,128,.1);cursor:pointer;padding:8px}
    .hamburger span{display:block;width:16px;height:2px;background:var(--t2);border-radius:1px;transition:all .2s}

    /* ── ALERTS ── */
    .alert{border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
    .alert.warn{background:var(--amber-l);border:1px solid rgba(255,149,0,.3)}
    .alert.info{background:var(--blue-l);border:1px solid rgba(0,122,255,.2)}
    .alert.mention{background:var(--rose-l);border:1px solid rgba(233,30,140,.2)}
    .aico{font-size:18px;flex-shrink:0;margin-top:1px}
    .atxt{font-size:13px;line-height:1.5;font-weight:500}
    .atxt strong{font-weight:600;display:block;margin-bottom:2px}

    /* ── COUNTDOWN ── */
    .cdown{background:linear-gradient(135deg,var(--rose),#c2185b);border-radius:0;padding:18px 16px;margin:0 -16px 14px;color:#fff;display:flex;align-items:center;justify-content:space-between}
    @media(min-width:768px){.cdown{border-radius:16px;margin:0 0 14px}}
    .cl p{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
    .cl h3{font-family:'Lora',serif;font-size:18px;margin-top:3px;font-weight:600}
    .cl .dt{font-size:13px;opacity:.85;margin-top:4px}
    .cr{text-align:right}
    .cr .num{font-size:48px;font-weight:700;line-height:1;letter-spacing:-2px}
    .cr .lbl{font-size:11px;opacity:.8;font-weight:500}

    /* ── PROGRESS ── */
    .prog-card{background:var(--sur);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .prog-hdr span{font-size:14px;color:var(--t2);font-weight:500}
    .prog-hdr strong{font-size:15px;font-weight:700}
    .prog-bar{height:6px;background:rgba(120,120,128,.15);border-radius:999px;overflow:hidden}
    .prog-fill{height:100%;border-radius:999px;background:var(--rose);transition:width .6s cubic-bezier(.4,0,.2,1)}
    .motiv{font-size:13px;color:var(--t3);margin-top:8px;font-style:italic}

    /* ── INFO CARD ── */
    .info-card{background:var(--sur);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .info-card h3{font-size:15px;font-weight:600;margin-bottom:10px}
    .irow{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--br);font-size:14px}
    .iico{font-size:20px;flex-shrink:0}

    /* ── TASK CARDS ── */
    .tc{background:var(--sur);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .tc:active{transform:scale(.98);box-shadow:none}
    .tc.done{opacity:.4}
    .tc-row{display:grid;grid-template-columns:30px 1fr auto;gap:12px;align-items:start}
    .chk{width:26px;height:26px;border-radius:50%;border:2px solid rgba(120,120,128,.3);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:1px}
    .chk.done{background:var(--sage);border-color:var(--sage)}
    .chk-ico{display:none}
    .chk.done .chk-ico{display:block}
    .chk-ico svg{width:13px;height:13px}
    .tt{font-size:15px;font-weight:600;color:var(--t);line-height:1.3;letter-spacing:-.1px}
    .tc.done .tt{text-decoration:line-through}
    .tm{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
    .pdot{width:8px;height:8px;border-radius:50%;margin-top:9px;flex-shrink:0}
    .pdot.hoch{background:var(--red)}.pdot.mittel{background:var(--amber)}.pdot.niedrig{background:var(--sage)}
    .tc-hint{font-size:11px;color:var(--t3);margin-top:5px;font-weight:400}

    /* ── SECTION HEADER ── */
    .sh{font-size:13px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px}

    /* ── TEMPLATES ── */
    .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .tpl-card{background:var(--sur);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s;text-align:left;box-shadow:0 1px 3px rgba(0,0,0,.06);border:none;font-family:inherit}
    .tpl-card:active{transform:scale(.97)}
    .tpl-ico{font-size:24px;margin-bottom:8px}
    .tpl-name{font-size:14px;font-weight:600;color:var(--t)}
    .tpl-cnt{font-size:12px;color:var(--t3);margin-top:2px}
    .tpl-card.added{background:var(--sage-l)}
    .tpl-card.added .tpl-name{color:#1b5e20}
    .tpl-detail-back{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--rose-d);font-weight:600;cursor:pointer;border:none;background:none;padding:4px 0;margin-bottom:12px;font-family:inherit}
    .tpl-detail-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .tpl-detail-header .tpl-ico{font-size:28px;margin-bottom:0}

    .b-dist-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sur);border-radius:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}

    .b-dist-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.3s}
    .b-dist-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
    .b-dist-switch input:checked+.b-dist-slider{background:var(--rose)}

    .b-stack-wrap{background:var(--sur);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .b-stack-label{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:6px;display:flex;justify-content:space-between}
    .b-stack-label span{font-weight:700;color:var(--t)}
    .b-stack-bar-wrap{position:relative;margin-bottom:14px}
    .b-stack-bar{width:100%;height:32px;border-radius:10px;background:var(--br);overflow:hidden;display:flex;position:relative}
    .b-stack-ref{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--t);border-radius:1px;z-index:2;pointer-events:none}
    .b-stack-ref::after{content:attr(data-label);position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--t);white-space:nowrap;background:var(--sur);padding:1px 4px;border-radius:4px;line-height:1.2}
    .b-stack-seg{height:100%;transition:width .4s ease;position:relative;min-width:0}
    .b-stack-seg:first-child{border-radius:10px 0 0 10px}
    .b-stack-seg:last-child{border-radius:0 10px 10px 0}
    .b-stack-seg:only-child{border-radius:10px}
    .b-stack-legend{display:flex;flex-wrap:wrap;gap:8px 14px;padding-top:12px;border-top:1px solid var(--br)}
    .b-stack-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);font-weight:500;cursor:default}
    .b-stack-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
    .b-stack-leg-item .leg-val{color:var(--t);font-weight:600;margin-left:2px}

    /* ── DOCUMENT LINKS ── */
    .doc-section{margin-top:4px;margin-bottom:8px}
    .doc-list{display:flex;flex-direction:column;gap:6px}
    .doc-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:10px;font-size:13px}
    .doc-item .doc-ico{font-size:16px;flex-shrink:0}
    .doc-item .doc-name{flex:1;font-weight:500;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .doc-item a{color:var(--blue,#007AFF);text-decoration:none;font-size:12px;font-weight:600;flex-shrink:0}
    .doc-item .doc-del{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:0 2px;flex-shrink:0}

    .doc-add{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;max-width:100%;overflow:hidden}
    .doc-add input{flex:1 1 80px;min-width:0;padding:7px 10px;border:1px solid var(--br);border-radius:8px;font-size:12px;font-family:inherit;background:var(--sur);color:var(--t);box-sizing:border-box}
    .doc-add input::placeholder{color:var(--t3)}
    .doc-add button{padding:6px 12px;border:none;border-radius:8px;background:var(--rose);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}

    /* ── BUDGET HISTORY ── */
    .bh-card{background:var(--sur);border-radius:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
    .bh-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none}
    .bh-header h3{font-size:15px;font-weight:700;margin:0;letter-spacing:-.1px}
    .bh-chevron{font-size:18px;color:var(--t3);transition:transform .3s ease;display:inline-block}
    .bh-card.open .bh-chevron{transform:rotate(180deg)}
    .bh-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
    .bh-card.open .bh-body{max-height:600px}
    .bh-body-inner{padding:0 16px 14px}
    .bh-entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--br);font-size:13px}
    .bh-entry:last-child{border-bottom:none}
    .bh-date{font-size:11px;color:var(--t3);min-width:70px;flex-shrink:0}
    .bh-ico{font-size:16px;flex-shrink:0}
    .bh-title{flex:1;font-weight:500;color:var(--t);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bh-amount{font-weight:600;flex-shrink:0}

    /* ── SORT BAR ── */
    .sort-bar{margin-bottom:10px}
    .sort-select{font-family:inherit;font-size:13px;font-weight:500;padding:8px 14px;border-radius:10px;border:none;background:var(--sur);color:var(--t2);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);-webkit-appearance:none;appearance:none;outline:none}

    /* ── SUBTASKS ── */
    .subtask-list{margin:8px 0}

    .subtask-add button{padding:8px 14px;border-radius:10px;border:none;background:var(--rose);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
    .st-mini{font-size:11px;color:var(--rose);font-weight:600;margin-left:4px}

    /* ── VIEW TOGGLE ── */
    .view-toggle{display:flex;gap:4px;background:rgba(120,120,128,.12);border-radius:10px;padding:2px;margin-bottom:10px}
    .view-toggle button{flex:1;padding:7px 12px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;background:transparent;transition:all .15s}
    .view-toggle button.on{background:var(--sur);color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,.1)}

    /* ── KANBAN ── */
    .kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;min-height:300px}
    .kanban-col{min-width:260px;flex:1;background:var(--bg);border-radius:14px;padding:12px;display:flex;flex-direction:column}
    .kanban-col-head{font-size:13px;font-weight:700;color:var(--t2);padding:8px 4px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);border-radius:8px}
    .kanban-col-head .cnt{font-size:11px;font-weight:500;color:var(--t3);background:rgba(120,120,128,.12);padding:2px 8px;border-radius:6px}
    .kanban-card{background:var(--sur);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .15s}
    .kanban-card:active{transform:scale(.98)}
    .kanban-card .kc-title{font-size:14px;font-weight:600;margin-bottom:6px}
    .kanban-card .kc-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;font-size:12px}
    .kanban-card .kc-meta .chip{font-size:11px;padding:2px 7px}

    /* ── VENDOR CHIP ON TASK ── */
    .chip.vendor{background:var(--blue-l);color:var(--blue);font-size:11px}

    /* ── TASK/VENDOR POPUP FORM FIELDS ── */
    .tp-field{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .tp-field label{font-size:12px;font-weight:600;color:var(--t3);min-width:80px;flex-shrink:0}
    .tp-field .inp{flex:1;margin-bottom:0}
    .tp-section{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--br)}
    .tp-section:first-of-type{border-top:none;margin-top:8px}
    #vendor-popup .sheet{max-width:520px}

    /* ── MEILENSTEINE / MILESTONES ── */
    .ms-card{position:relative;padding-left:32px;margin-bottom:4px}
    .ms-card:last-child .ms-content::after{display:none}
    .ms-timeline-dot{position:absolute;left:0;top:18px;width:16px;height:16px;border-radius:50%;border:3px solid var(--rose);background:var(--sur);z-index:2;flex-shrink:0}
    .ms-timeline-dot.done{background:var(--sage);border-color:var(--sage)}
    .ms-timeline-dot.past{background:var(--rose);border-color:var(--rose)}
    .ms-timeline-dot.future{background:var(--sur);border-color:rgba(120,120,128,.3)}
    .ms-card::before{content:'';position:absolute;left:7px;top:34px;bottom:0;width:2px;background:var(--br);z-index:1}
    .ms-card:last-child::before{display:none}
    .ms-content{background:var(--sur);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .ms-header{margin-bottom:12px}
    .ms-label{font-size:16px;font-weight:700;color:var(--t);letter-spacing:-.2px}
    .ms-date-range{font-size:12px;color:var(--t3);margin-top:2px;font-weight:500}
    .ms-progress{margin-bottom:10px}
    .ms-progress-bar{height:6px;background:rgba(120,120,128,.15);border-radius:999px;overflow:hidden;margin-bottom:4px}
    .ms-progress-fill{height:100%;border-radius:999px;background:var(--rose);transition:width .6s cubic-bezier(.4,0,.2,1)}
    .ms-progress-text{font-size:12px;color:var(--t3);font-weight:500}
    .ms-cost{font-size:13px;font-weight:600;color:var(--sage);margin-bottom:10px}
    .ms-tasks{margin-bottom:10px}
    .ms-task{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(120,120,128,.08);cursor:pointer;transition:background .1s}
    .ms-task:last-child{border-bottom:none}
    .ms-task.done{opacity:.45}
    .ms-task .chk{width:22px;height:22px;margin-top:2px;flex-shrink:0}
    .ms-task-info{flex:1;min-width:0}
    .ms-task-title{font-size:14px;font-weight:600;color:var(--t);line-height:1.3}
    .ms-task.done .ms-task-title{text-decoration:line-through}
    .ms-task-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
    .ms-actions{display:flex;gap:8px;flex-wrap:wrap}
    .ms-add-btn{font-size:12px;font-weight:600;padding:7px 14px;border-radius:10px;border:none;background:rgba(120,120,128,.1);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s}
    .ms-add-btn:hover{background:rgba(120,120,128,.18)}

    @media(max-width:400px){
      .ms-card{padding-left:24px}
      .ms-timeline-dot{width:12px;height:12px;left:0;top:20px}
      .ms-card::before{left:5px}
    }
  </style>
</head>

// MENTION PARSING
function parseMentions(text){
  return text.replace(/@(\w+)/g,(m,name)=>`<span class="c-mention">@${name}</span>`);
}
function extractMentionedNames(text){
  return [...text.matchAll(/@(\w+)/g)].map(m=>m[1]);
}

// NOTIFICATION CHECK
function checkMentions(){
  if(!firstName)return;
  const myMentions=[];
  tasks.forEach(t=>{
    (t.comments||[]).forEach(c=>{
      if(c.author!==firstName&&c.text.includes(`@${firstName}`)&&!seenMentions.has(c.ts?.toString())){
        myMentions.push({task:t.title,author:c.author,text:c.text,ts:c.ts,taskId:t.id});
      }
    });
  });
  const dot=document.getElementById('notif-dot');
  if(dot)dot.style.display=myMentions.length?'block':'none';
  return myMentions;
}

window.openNotif=function(){
  const mentions=checkMentions();
  if(!mentions.length)return;
  document.getElementById('notif-list').innerHTML=mentions.map(m=>`
    <div style="background:var(--bg);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer" onclick="openTaskById(${m.taskId});closeNotif()">
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">${m.author} in "${m.task}"</div>
      <div style="font-size:13px;color:var(--t2)">${parseMentions(m.text)}</div>
    </div>`).join('');
  document.getElementById('notif-overlay').classList.add('open');
};
window.closeNotif=function(){
  const mentions=checkMentions();
  mentions.forEach(m=>{if(m.ts)seenMentions.add(m.ts.toString());});
  localStorage.setItem('seenMentions',JSON.stringify([...seenMentions]));
  document.getElementById('notif-overlay').classList.remove('open');
  document.getElementById('notif-dot').style.display='none';
};

  } else {
    html+=`<div class="sheet2-title-static">${t.title}</div>`;
  }

  // Status chips row
  html+=`<div class="sheet2-section"><div class="sheet2-section-label">Details</div><div class="sheet2-chips">`;

  // Priority chip
  const prioLabels={hoch:'🔴 Hoch',mittel:'🟡 Mittel',niedrig:'🟢 Niedrig'};

      </div>
    </div>`;
  } else {
    html+=`<span class="sheet2-chip prio-${t.prio}">${prioLabels[t.prio]||'🟡 Mittel'}</span>`;
  }

  // Category chip
  if(canEditFields){
    html+=`<div class="sheet2-chip-wrap" id="tp-cat-wrap">
      <button class="sheet2-chip chip-cat" ${ddToggle('tp-cat-dd')}>${t.cat}</button>

      </div>
    </div>`;
  } else {
    html+=`<span class="sheet2-chip chip-cat">${t.cat}</span>`;
  }

  // Due date chip
  const late=!t.done&&t.due&&t.due<today;
  const dv=t.due?dl(t.due):null;

  if(canEditFields){
    html+=`<div class="sheet2-chip-wrap">

    </div>`;
  } else if(t.due) {
    const dueLabel=late?'⚠ '+fmt(t.due):(soon?'in '+dv+'d':fmt(t.due));
    html+=`<span class="sheet2-chip chip-due ${late?'late':soon?'soon':''}">📅 ${dueLabel}</span>`;

  if(isA){
    html+=`<div class="sheet2-avatar-row" id="popup-assignees">
      ${allUsers.filter(u=>u.firstName).map(u=>`<button class="sheet2-avatar ${(t.assignees||[]).includes(u.firstName)?'on':''}" onclick="togglePopupAssignee(${t.id},'${u.firstName}')" title="${u.firstName}">${u.firstName}</button>`).join('')}
    </div>`;
  } else {
    const names=(t.assignees||[]).join(', ');
    html+=`<div class="sheet2-avatar-row">${names?`<span style="font-size:14px;color:var(--t2)">${names}</span>`:'<span style="font-size:13px;color:var(--t3)">Niemand zugewiesen</span>'}</div>`;
  }
  html+=`</div>`;

  // Subtasks section
  const subs=t.subtasks||[];
  const stDone=subs.filter(s=>s.done).length;
  html+=`<div class="sheet2-section"><div class="sheet2-section-label">Teilaufgaben ${subs.length?'<span style="font-weight:700;color:var(--rose)">'+stDone+'/'+subs.length+'</span>':''}</div>`;
  if(subs.length){
    subs.forEach(s=>{
      html+=`<div class="sheet2-subtask-row ${s.done?'st-done':''}"><input type="checkbox" ${s.done?'checked':''} onchange="toggleSubtask(${t.id},'${s.id}')"/><span>${s.text}</span>${(isA||assigned)?`<button onclick="removeSubtask(${t.id},'${s.id}')">×</button>`:''}</div>`;
    });
  } else {
    html+=`<div style="font-size:13px;color:var(--t3);padding:4px 0">Keine Teilaufgaben</div>`;
  }
  if(isA||assigned){
    html+=`<div class="subtask-add" style="margin-top:8px"><input type="text" id="subtask-inp-${t.id}" placeholder="Neue Teilaufgabe..." onkeydown="if(event.key==='Enter')addSubtask(${t.id})"/><button onclick="addSubtask(${t.id})">+</button></div>`;
  }
  html+=`</div>`;

  // Cost section - toggleable, optional
  const catPlan=catBudget[t.cat]||0;
  const catActual=tasks.filter(x=>x.cat===t.cat&&!x.trashed).reduce((s,x)=>s+(x.costActual||0),0);
  const hasCost=t.costActual!=null&&t.costActual!=='';

  html+=`<div class="sheet2-section"><div class="sheet2-section-label">Kosten</div>`;
  if(canEditCost){
    if(hasCost){
      // Show cost input + optional remove button
      html+=`<div class="sheet2-input-row">`;
      html+=`<input type="number" class="sheet2-inline-input" id="tp-cost" value="${t.costActual||''}" placeholder="0" style="text-align:right;font-size:18px;font-weight:700"/>`;
      html+=`<span class="sheet2-unit">€</span>`;
      if(catPlan>0){
        const catRemaining=catPlan-catActual;
        const catColor=catRemaining<0?'var(--red)':catRemaining<catPlan*0.2?'var(--amber)':'var(--t3)';
        html+=`<span style="font-size:12px;color:${catColor};margin-left:12px;white-space:nowrap">${catRemaining>=0?'Noch '+eur(catRemaining)+' in '+t.cat:eur(Math.abs(catRemaining))+' über Plan'}</span>`;
      }
      html+=`<button id="tp-cost-remove" style="margin-left:8px;background:none;border:none;font-size:18px;color:var(--t3);cursor:pointer;padding:4px" title="Kosten entfernen">✕</button>`;
      html+=`</div>`;
    } else {
      // Show "add cost" button
      html+=`<button id="tp-cost-add" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1.5px dashed var(--br);background:none;color:var(--t3);font-size:13px;font-family:inherit;cursor:pointer;width:100%;justify-content:center">💶 Kosten hinzufügen</button>`;
    }
  } else if(hasCost){
    html+=`<div style="font-size:18px;font-weight:700">${eur(t.costActual)}</div>`;
  } else {
    html+=`<div style="font-size:13px;color:var(--t3)">Keine Kosten</div>`;
  }
  html+=`</div>`;

  // Documents section
  html+=`<div class="sheet2-section"><div class="sheet2-section-label">Dokumente</div>`;
  const docs=t.docs||[];
  if(docs.length){
    html+=`<div class="doc-list">`;
    docs.forEach((dc,di)=>{
      const ico=dc.name.match(/\.(pdf)$/i)?'📄':dc.name.match(/\.(xlsx?|csv)$/i)?'📊':dc.name.match(/\.(docx?|txt)$/i)?'📝':dc.name.match(/\.(jpe?g|png|gif|webp)$/i)?'🖼️':'📎';
      html+=`<div class="doc-item"><span class="doc-ico">${ico}</span><span class="doc-name">${dc.name}</span><a href="${dc.url}" target="_blank" rel="noopener">Öffnen</a>${(isA||assigned)?`<button class="doc-del" onclick="removeTaskDoc(${t.id},${di})" title="Entfernen">×</button>`:''}
      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div style="font-size:13px;color:var(--t3);padding:4px 0">Keine Dokumente</div>`;
  }
  if(isA||assigned){
    html+=`<div class="doc-add">
      <input type="text" id="doc-name-${t.id}" placeholder="Name (z.B. Angebot.pdf)"/>
      <input type="text" id="doc-url-${t.id}" placeholder="Link (iCloud, Drive…)" style="flex:2"/>
      <button onclick="addTaskDoc(${t.id})">+ Link</button>
    </div>`;
  }
  html+=`</div>`;

  // Comments section
  html+=`<div class="sheet2-section"><div class="sheet2-section-label">Kommentare</div>
  <div class="comment-list" id="popup-comments">
    ${(t.comments||[]).map(c=>`<div class="comment"><span class="c-author">${c.author}</span>${parseMentions(c.text)}<span class="c-time">${c.ts?new Date(c.ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}):''}  </span></div>`).join('')}
  </div>
  <div class="c-inp-wrap">
    <textarea class="c-inp" id="popup-cinp" rows="2" placeholder="Kommentar... (@Name zum Erwähnen)" oninput="handleMentionInput(${t.id},this)"></textarea>
    <button class="c-send" onclick="submitComment(${t.id})">➤</button>
  </div>
  <div class="mention-suggestions" id="mention-suggestions"></div>
  <div class="mention-hint" style="margin-bottom:4px">Tipp: @Vorname erwähnt jemanden und weist die Aufgabe zu</div>
  </div>`;

  // Action buttons
  html+=`<div class="sheet2-actions">
    ${canChk?`<button class="sheet2-btn-primary" onclick="togAndClose(${t.id})">${t.done?'↩ Wiedereröffnen':'✓ Erledigt'}</button>`:''}
    ${t.due&&!t.trashed?`<button class="sheet2-btn-ghost" data-action="cal" data-id="${t.id}">📅</button>`:''}
    ${t.trashed?`<button class="sheet2-btn-ghost" data-popup-restore="${t.id}">↩ Wiederherstellen</button><button class="sheet2-btn-danger" data-popup-delete-final="${t.id}">✕ Endgültig löschen</button>`:(isA?`<button class="sheet2-btn-danger" data-popup-trash="${t.id}">🗑 Papierkorb</button>`:'')}
  </div>`;

  document.getElementById('popup-content').innerHTML=html;
  document.getElementById('task-popup').classList.add('open');

  // Attach auto-save listeners for inline editing
  const pc=document.getElementById('popup-content');

  // Title auto-save
  const titleEl=pc.querySelector('#tp-title');
  if(titleEl){titleEl.addEventListener('input',()=>{
    const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
    tt.title=titleEl.value.trim()||tt.title;
    sheet2AutoSave();
  });}

  // Due date auto-save
  const dueEl=pc.querySelector('#tp-due');
  if(dueEl){dueEl.addEventListener('change',()=>{
    const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
    tt.due=dueEl.value;
    sheet2AutoSave();
  });}

  // Cost auto-save
  const costEl=pc.querySelector('#tp-cost');
  if(costEl){costEl.addEventListener('input',()=>{
    const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
    const oldVal=tt.costActual||0;
    const newVal=parseFloat(costEl.value)||0;
    if(oldVal!==newVal){budgetHistory.push({date:Date.now(),cat:tt.cat,title:tt.title,oldCost:oldVal,newCost:newVal});}
    tt.costActual=newVal;
    sheet2AutoSave();
  });}
  // Cost add button
  const costAddBtn=pc.querySelector('#tp-cost-add');
  if(costAddBtn){costAddBtn.addEventListener('click',()=>{
    const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
    tt.costActual=0;
    openTaskPopup(tt);
    setTimeout(()=>{const inp=document.getElementById('tp-cost');if(inp)inp.focus();},100);
  });}
  // Cost remove button
  const costRemBtn=pc.querySelector('#tp-cost-remove');
  if(costRemBtn){costRemBtn.addEventListener('click',()=>{
    const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
    const oldVal=tt.costActual||0;
    if(oldVal>0){budgetHistory.push({date:Date.now(),cat:tt.cat,title:tt.title,oldCost:oldVal,newCost:0});}
    tt.costActual=null;
    sheet2AutoSave();
    openTaskPopup(tt);
  });}

  // Priority dropdown
  pc.querySelectorAll('#tp-prio-dd .sheet2-chip-dropdown-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
      tt.prio=item.dataset.prio;
      sheet2AutoSave();
      openTaskPopup(tt);
    });
  });

  // Category dropdown
  pc.querySelectorAll('#tp-cat-dd .sheet2-chip-dropdown-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
      tt.cat=item.dataset.cat;
      sheet2AutoSave();
      openTaskPopup(tt);
    });
  });

  // Vendor dropdown
  pc.querySelectorAll('#tp-vendor-dd .sheet2-chip-dropdown-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const tt=tasks.find(x=>x.id===t.id);if(!tt)return;
      const vv=item.dataset.vendor;
      tt.vendorId=vv?parseInt(vv):null;
      sheet2AutoSave();
      openTaskPopup(tt);
    });
  });

  // Close dropdowns on outside click
  pc.addEventListener('click',(e)=>{
    const wrap=e.target.closest('.sheet2-chip-wrap');
    pc.querySelectorAll('.sheet2-chip-dropdown.open').forEach(dd=>{
      if(!wrap||!wrap.contains(dd)) dd.classList.remove('open');
    });
  });

  // Trash button
  const trashBtn=pc.querySelector('[data-popup-trash]');
  if(trashBtn){trashBtn.addEventListener('click',async()=>{
    const id=parseInt(trashBtn.dataset.popupTrash);
    const tt=tasks.find(x=>x.id===id);if(!tt)return;
    tt.trashed=true;tt.trashedAt=Date.now();
    await save();document.getElementById('task-popup').classList.remove('open');render();
  });}
  // Restore button
  const restBtn=pc.querySelector('[data-popup-restore]');
  if(restBtn){restBtn.addEventListener('click',async()=>{
    const id=parseInt(restBtn.dataset.popupRestore);
    const tt=tasks.find(x=>x.id===id);if(!tt)return;
    delete tt.trashed;delete tt.trashedAt;
    await save();document.getElementById('task-popup').classList.remove('open');render();
  });}
  // Endgültig löschen button in popup
  const delFinalBtn=pc.querySelector('[data-popup-delete-final]');
  if(delFinalBtn){delFinalBtn.addEventListener('click',async()=>{
    const id=parseInt(delFinalBtn.dataset.popupDeleteFinal);
    if(!confirm('Endgültig löschen? Kann nicht rückgängig gemacht werden.'))return;
    tasks=tasks.filter(x=>x.id!==id);
    await save();document.getElementById('task-popup').classList.remove('open');render();
  });}
}

window.togglePopupAssignee=async function(id,name){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(!t.assignees)t.assignees=[];
  const idx=t.assignees.indexOf(name);
  if(idx>-1)t.assignees.splice(idx,1);else t.assignees.push(name);
  await save();
  // Refresh avatars (sheet2-avatar or aschip)
  const grid=document.getElementById('popup-assignees');
  if(grid){
    grid.querySelectorAll('.sheet2-avatar').forEach(ch=>{
      ch.classList.toggle('on',t.assignees.includes(ch.getAttribute('title')));
    });
    grid.querySelectorAll('.aschip').forEach(ch=>{
      ch.classList.toggle('on',t.assignees.includes(ch.textContent));
    });
  }
};

window.updateTaskCost=async function(id,v){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const oldVal=t.costActual||0;const newVal=parseFloat(v)||0;
  if(oldVal!==newVal){budgetHistory.push({date:Date.now(),cat:t.cat,title:t.title,oldCost:oldVal,newCost:newVal});}
  t.costActual=newVal;await save();
};

window.togAndClose=async function(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;await save();
  document.getElementById('task-popup').classList.remove('open');
  render();
};

window.trashTaskAndClose=async function(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.trashed=true;t.trashedAt=Date.now();
  await save();
  document.getElementById('task-popup').classList.remove('open');
  render();
};

// MENTION HANDLING
window.handleMentionInput=function(id,el){
  const val=el.value;
  const atPos=val.lastIndexOf('@');
  const sugg=document.getElementById('mention-suggestions');
  if(atPos>-1&&atPos===val.length-1||(atPos>-1&&!val.slice(atPos+1).includes(' '))){
    const query=val.slice(atPos+1).toLowerCase();
    const matches=allUsers.filter(u=>u.firstName&&u.firstName.toLowerCase().startsWith(query));
    if(matches.length){
      sugg.style.display='block';
      sugg.innerHTML=matches.map(u=>`<div class="mention-opt" onclick="insertMention(${id},'${u.firstName}')">${u.firstName}</div>`).join('');
    }else{sugg.style.display='none';}
  }else{sugg.style.display='none';}
};

window.insertMention=function(id,name){
  const inp=document.getElementById('popup-cinp');
  const val=inp.value;
  const atPos=val.lastIndexOf('@');
  inp.value=val.slice(0,atPos)+'@'+name+' ';
  document.getElementById('mention-suggestions').style.display='none';
  inp.focus();
};

window.submitComment=async function(id){
  const inp=document.getElementById('popup-cinp');
  const text=inp.value.trim();if(!text)return;
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(!t.comments)t.comments=[];
  const ts=Date.now();
  t.comments.push({author:firstName||'Unbekannt',text,ts});
  // Auto-assign mentioned users
  const mentioned=extractMentionedNames(text);
  mentioned.forEach(name=>{
    const u=allUsers.find(x=>x.firstName&&x.firstName.toLowerCase()===name.toLowerCase());
    if(u&&u.firstName&&!(t.assignees||[]).includes(u.firstName)){
      if(!t.assignees)t.assignees=[];
      t.assignees.push(u.firstName);
    }
  });
  inp.value='';document.getElementById('mention-suggestions').style.display='none';
  await save();
  // Update comment list in popup
  const list=document.getElementById('popup-comments');
  if(list){const div=document.createElement('div');div.className='comment';div.innerHTML=`<span class="c-author">${firstName||'Unbekannt'}</span>${parseMentions(text)}<span class="c-time">${new Date(ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}</span>`;list.appendChild(div);}
  checkMentions();
};

// CLOSE TASK POPUP (click on backdrop)
document.getElementById('task-popup').addEventListener('click',e=>{if(e.target===document.getElementById('task-popup')){document.getElementById('task-popup').classList.remove('open');render();}});

// RENDER FUNCTIONS
function render(){
  updateUI();
  const trashCount=tasks.filter(t=>t.trashed).length;
  const fbTrash=document.getElementById('fb-trash');
  if(fbTrash)fbTrash.textContent=trashCount>0?'Papierkorb ('+trashCount+')':'Papierkorb';
  if(tab==='home')renderHome();
  else if(tab==='aufgaben'){
    if(flt==='papierkorb')renderPapierkorb();
    else renderAufgaben();
  }
  else if(tab==='meilensteine')renderMeilensteine();
  else if(tab==='anbieter')renderAnbieter();
  else if(tab==='budget')renderBudget();
  else if(tab==='papierkorb')renderPapierkorb();
  else if(tab==='nutzer')renderNutzer();
  else renderInfo();
}

function renderHome(){
  const a=document.getElementById('scroll');
  if(!a)return;
  let h='';
  try{
    const mentions=checkMentions();
    if(mentions.length)h+=`<div class="alert mention"><div class="aico">🔔</div><div class="atxt"><strong>Du wurdest ${mentions.length}x erwaehnt!</strong><a onclick="openNotif()" style="color:var(--rose-d);cursor:pointer">Jetzt ansehen</a></div></div>`;
  }catch(e){}
  if(wDate){const d=dl(wDate);h+=`<div class="cdown"><div class="cl"><p>Bis zur Hochzeit</p><h3>Luisa & Nico</h3><div class="dt">${fmt(wDate)}</div></div><div class="cr"><div class="num">${d>0?d:'!'}</div><div class="lbl">${d>0?'Tage':''}</div></div></div>`;}
  else{h+=`<div class="cdown"><div class="cl"><p>Bis zur Hochzeit</p><h3>Luisa & Nico</h3></div><div class="cr"><div class="num">-</div></div></div>`;}
  h+=`<div class="info-card"><h3>Hochzeitsinfos</h3>
    <div class="irow"><div class="iico">📍</div><div><strong>Ort</strong><br><span style="color:var(--t2);font-size:13px" id="g-loc">Wird bekannt gegeben</span></div></div>
    <div class="irow"><div class="iico">🕐</div><div><strong>Datum & Uhrzeit</strong><br><span style="color:var(--t2);font-size:13px" id="g-time">Wird bekannt gegeben</span></div></div>
    <div class="irow"><div class="iico">👗</div><div><strong>Dresscode</strong><br><span style="color:var(--t2);font-size:13px" id="g-dress">Wird bekannt gegeben</span></div></div>
  </div>`;
  if(role==='gast')h+=`<div class="alert info"><div class="aico">👤</div><div class="atxt"><strong>Mithelfer oder Trauzeuge?</strong><a onclick="openAuth()" style="color:var(--rose);cursor:pointer"> Hier anmelden</a></div></div>`;
  a.innerHTML=h;
  loadInfo();
}

async function loadInfo(){
  try{const s=await getDoc(ID);if(s.exists()){const d=s.data();
    ['g-loc','g-time','g-dress'].forEach((id,i)=>{const e=document.getElementById(id);if(e)e.textContent=[d.location,d.time,d.dresscode][i]||'Wird bekannt gegeben';});
  }}catch(e){}
}

function renderAufgaben(){
  const a=document.getElementById('scroll');
  const isA=role==='admin',isH=role==='mithelfer';
  const tot=tasks.length,don=tasks.filter(t=>t.done).length,pct=tot?Math.round(don/tot*100):0;
  let h=`<div class="prog-card"><div class="prog-hdr"><span>Fortschritt</span><strong>${pct}% erledigt</strong></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><div class="motiv">${motiv(pct)}</div></div>`;
  const late=tasks.filter(t=>!t.done&&t.due&&t.due<today);
  const week=tasks.filter(t=>{if(t.done||!t.due)return false;const d=dl(t.due);return d>=0&&d<=7;});
  if(late.length)h+=`<div class="alert warn"><div class="aico">⚠️</div><div class="atxt"><strong>${late.length} Aufgabe${late.length>1?'n':''} überfällig!</strong>${late.map(t=>t.title).join(', ')}</div></div>`;
  else if(week.length)h+=`<div class="alert info"><div class="aico">📌</div><div class="atxt"><strong>${week.length} diese Woche fällig</strong>${week.slice(0,3).map(t=>t.title).join(', ')}</div></div>`;

  h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap"><div class="view-toggle" style="margin-bottom:0;flex:1"><button class="${taskView==='liste'?'on':''}" onclick="setTaskView('liste')">Liste</button><button class="${taskView==='kanban'?'on':''}" onclick="setTaskView('kanban')">Kanban</button></div><button onclick="window.openVorlagenOverlay()" style="font-size:13px;padding:7px 14px;border-radius:10px;border:none;background:var(--sur);color:var(--t2);cursor:pointer;font-family:inherit;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08);white-space:nowrap">📋 Vorlagen</button></div>`;
  h+=`<div class="sort-bar"><select class="sort-select" onchange="setTaskSort(this.value)"><option value="none"${taskSort==='none'?' selected':''}>Sortierung</option><option value="title"${taskSort==='title'?' selected':''}>Name A-Z</option><option value="title-desc"${taskSort==='title-desc'?' selected':''}>Name Z-A</option><option value="prio"${taskSort==='prio'?' selected':''}>Priorität ↑</option><option value="prio-desc"${taskSort==='prio-desc'?' selected':''}>Priorität ↓</option><option value="due"${taskSort==='due'?' selected':''}>Fällig bald → spät</option><option value="due-desc"${taskSort==='due-desc'?' selected':''}>Fällig spät → bald</option><option value="assignee"${taskSort==='assignee'?' selected':''}>Zugewiesen A-Z</option></select></div>`;
  h+=`<div style="position:relative;margin-bottom:12px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none">🔍</span><input type="text" class="task-search-input" value="${taskSearch.replace(/"/g,'&quot;')}" placeholder="Aufgaben durchsuchen…" oninput="window._setTaskSearch(this.value)" style="width:100%;padding:10px 14px 10px 38px;border-radius:10px;border:none;background:rgba(120,120,128,.12);font-family:inherit;font-size:15px;color:var(--t);outline:none"/></div>`;

  let vis=tasks.filter(t=>!t.trashed);
  if(flt==='offen')vis=vis.filter(t=>!t.done);
  else if(flt==='erledigt')vis=vis.filter(t=>t.done);
  else if(flt==='hoch')vis=vis.filter(t=>t.prio==='hoch'&&!t.done);
  else if(flt==='woche')vis=vis.filter(t=>{if(t.done||!t.due)return false;const d=dl(t.due);return d>=0&&d<=7;});
  else if(flt==='meine')vis=vis.filter(t=>isAssigned(t));

  if(taskSearch.trim()){const sq=taskSearch.trim().toLowerCase();vis=vis.filter(t=>(t.title||'').toLowerCase().includes(sq)||(t.cat||'').toLowerCase().includes(sq)||(t.assignees||[]).some(a=>a.toLowerCase().includes(sq)));}

  if(taskSort==='title') vis.sort((a,b)=>a.title.localeCompare(b.title));
  else if(taskSort==='title-desc') vis.sort((a,b)=>b.title.localeCompare(a.title));
  else if(taskSort==='prio') vis.sort((a,b)=>{const p={hoch:0,mittel:1,niedrig:2};return (p[a.prio]||1)-(p[b.prio]||1);});
  else if(taskSort==='prio-desc') vis.sort((a,b)=>{const p={hoch:0,mittel:1,niedrig:2};return (p[b.prio]||1)-(p[a.prio]||1);});
  else if(taskSort==='due') vis.sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999'));
  else if(taskSort==='due-desc') vis.sort((a,b)=>(b.due||'').localeCompare(a.due||''));
  else if(taskSort==='assignee') vis.sort((a,b)=>((a.assignees||[])[0]||'zzz').localeCompare((b.assignees||[])[0]||'zzz'));

  if(taskView==='kanban'){
    const open=vis.filter(t=>!t.done&&!(t.subtasks&&t.subtasks.length&&t.subtasks.some(s=>s.done)&&!t.subtasks.every(s=>s.done)));
    const inProg=vis.filter(t=>!t.done&&t.subtasks&&t.subtasks.length&&t.subtasks.some(s=>s.done)&&!t.subtasks.every(s=>s.done));
    const done=vis.filter(t=>t.done);
    function kanbanCard(t){
      const names=(t.assignees||[]).join(', ');
      const stProg=t.subtasks&&t.subtasks.length?`<span class="st-mini">${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}</span>`:'';
      const vendorName=t.vendorId?vendors.find(v=>v.id===t.vendorId)?.name:'';
      return`<div class="kanban-card" data-action="open-task" data-id="${t.id}">
        <div class="kc-title">${t.title}</div>
        <div class="kc-meta">
          <span class="pdot ${t.prio}" style="width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
          ${names?`<span class="chip per">${names}</span>`:''}
          ${t.due?`<span class="chip due">${fmt(t.due)}</span>`:''}
          ${stProg}
          ${vendorName?`<span class="chip vendor">${vendorName}</span>`:''}
        </div>
      </div>`;
    }
    h+=`<div class="kanban-board">
      <div class="kanban-col"><div class="kanban-col-head">Offen<span class="cnt">${open.length}</span></div>${open.map(kanbanCard).join('')}</div>
      <div class="kanban-col"><div class="kanban-col-head">In Bearbeitung<span class="cnt">${inProg.length}</span></div>${inProg.map(kanbanCard).join('')}</div>
      <div class="kanban-col"><div class="kanban-col-head">Erledigt<span class="cnt">${done.length}</span></div>${done.map(kanbanCard).join('')}</div>
    </div>`;
    a.innerHTML=h;stats();
    if(taskSearch){const tsi=a.querySelector('.task-search-input');if(tsi){tsi.focus();tsi.selectionStart=tsi.selectionEnd=tsi.value.length;}}
    return;
  }

  if(!vis.length){h+=`<div class="empty"><div class="ei">&#127800;</div>Keine Aufgaben gefunden.</div>`;}
  else h+=vis.map(t=>{
    const late=!t.done&&t.due&&t.due<today;
    const d=t.due?dl(t.due):null;
    const soon=!late&&d!==null&&d<=7&&d>=0;
    const lbl=t.due?(late?`⚠ ${fmt(t.due)}`:(soon?`in ${d}d`:fmt(t.due))):'';
    const assigned=isAssigned(t);
    const showCost=isA||(assigned&&t.costActual);
    const names=(t.assignees||[]).join(', ');
    const cCount=(t.comments||[]).length;
    const vendorName=t.vendorId?vendors.find(v=>v.id===t.vendorId)?.name:'';
    return`<div class="tc ${t.done?'done':''}" data-action="open-task" data-id="${t.id}">
      <div class="tc-row">
        <button class="chk ${t.done?'done':''}" data-action="tog-task" data-id="${t.id}">
          <span class="chk-ico"><svg viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </button>
        <div>
          <div class="tt">${t.title}</div>
          <div class="tm">
            ${names?`<span class="chip per">${names}</span>`:''}
            <span class="chip cat">${t.cat}</span>
            ${t.due?`<span class="chip due ${late?'late':soon?'soon':''}">${lbl}</span>`:''}
            ${showCost&&t.costActual?`<span class="chip cost">${eur(t.costActual)}</span>`:''}
            ${vendorName?`<span class="chip vendor">${vendorName}</span>`:''}
          </div>
          ${t.subtasks&&t.subtasks.length?`<span class="st-mini">${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length} Schritte</span>`:''}
          <div class="tc-hint">Tippen zum Öffnen ${cCount>0?`· 💬 ${cCount}`:''}</div>
        </div>
        <div class="pdot ${t.prio}"></div>
      </div>
    </div>`;
  }).join('');
  a.innerHTML=h;stats();
  // Restore search focus
  if(taskSearch){const tsi=a.querySelector('.task-search-input');if(tsi){tsi.focus();tsi.selectionStart=tsi.selectionEnd=tsi.value.length;}}
}

function renderMeilensteine(){
  const a=document.getElementById('scroll');
  if(!wDate){a.innerHTML=`<div class="alert info"><div class="aico">📅</div><div class="atxt"><strong>Kein Hochzeitsdatum gesetzt</strong><br>Bitte unter ⚙️ Info das Hochzeitsdatum eintragen, um die Meilensteine zu sehen.</div></div>`;return;}
  const wd=new Date(wDate),now=new Date();
  const phases=[
    {label:'12+ Monate vorher',monthsBefore:12,monthsBeforeEnd:Infinity},
    {label:'9–12 Monate vorher',monthsBefore:9,monthsBeforeEnd:12},
    {label:'6–9 Monate vorher',monthsBefore:6,monthsBeforeEnd:9},
    {label:'3–6 Monate vorher',monthsBefore:3,monthsBeforeEnd:6},
    {label:'1–3 Monate vorher',monthsBefore:1,monthsBeforeEnd:3},
    {label:'Letzter Monat',monthsBefore:0,monthsBeforeEnd:1},
  ];
  // Calculate phase date ranges
  const phaseRanges=phases.map(p=>{
    const endDate=new Date(wd);endDate.setMonth(endDate.getMonth()-p.monthsBefore);
    const startDate=p.monthsBeforeEnd===Infinity?null:new Date(wd);
    if(startDate)startDate.setMonth(startDate.getMonth()-p.monthsBeforeEnd);
    return{...p,startDate,endDate};
  });
  // Assign tasks to phases
  const activeTasks=tasks.filter(t=>!t.trashed);
  const phaseTaskMap=phases.map(()=>[]);
  const unplanned=[];
  const monthNames=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  activeTasks.forEach(t=>{
    if(!t.due){unplanned.push(t);return;}
    const td=new Date(t.due);
    const diffMs=wd.getTime()-td.getTime();
    const diffMonths=diffMs/(1000*60*60*24*30.44);
    let placed=false;
    for(let i=0;i<phases.length;i++){
      const p=phases[i];
      if(diffMonths>=p.monthsBefore&&(p.monthsBeforeEnd===Infinity||diffMonths<p.monthsBeforeEnd)){
        phaseTaskMap[i].push(t);placed=true;break;
      }
    }
    if(!placed){
      if(diffMonths<0)phaseTaskMap[phases.length-1].push(t);
      else phaseTaskMap[0].push(t);
    }
  });
  const fmtMonth=(d)=>d?monthNames[d.getMonth()]+' '+d.getFullYear():'';
  let h=`<div class="sh">Meilensteine</div>`;
  // Render each phase
  phaseRanges.forEach((p,i)=>{
    const pts=phaseTaskMap[i];
    const done=pts.filter(t=>t.done).length;
    const total=pts.length;
    const pct=total?Math.round(done/total*100):0;
    const cost=pts.reduce((s,t)=>s+(t.costActual||0),0);
    const phaseDate=p.startDate?`${fmtMonth(p.startDate)} – ${fmtMonth(p.endDate)}`:`vor ${fmtMonth(p.endDate)}`;
    const isPast=now>p.endDate;
    // Calculate a default due date for this phase (midpoint)
    const midDate=new Date(p.endDate);
    if(p.startDate){const mid=new Date((p.startDate.getTime()+p.endDate.getTime())/2);midDate.setTime(mid.getTime());}
    else{midDate.setMonth(midDate.getMonth()-1);}
    const midDateStr=midDate.toISOString().split('T')[0];
    // Relevant template IDs for this phase
    const phaseTPLMap={0:['loc'],1:['cat','foto'],2:['inv','flh','mus'],3:['deko','kld'],4:['kld'],5:[]};
    const relevantTpls=(phaseTPLMap[i]||[]).map(id=>TPLS.find(t=>t.id===id)).filter(Boolean);
    h+=`<div class="ms-card">
      <div class="ms-timeline-dot ${isPast?(pct===100?'done':'past'):'future'}"></div>
      <div class="ms-content">
        <div class="ms-header">
          <div class="ms-label">${p.label}</div>
          <div class="ms-date-range">${phaseDate}</div>
        </div>
        <div class="ms-progress">
          <div class="ms-progress-bar"><div class="ms-progress-fill" style="width:${pct}%"></div></div>
          <div class="ms-progress-text">${done}/${total} Aufgaben erledigt (${pct}%)</div>
        </div>
        ${cost>0?`<div class="ms-cost">Kosten: ${eur(cost)}</div>`:''}
        <div class="ms-tasks">`;
    if(pts.length){
      pts.forEach(t=>{
        const names=(t.assignees||[]).join(', ');
        const vnd=t.vendorId?vendors.find(v=>v.id===t.vendorId):null;
        const late=!t.done&&t.due&&t.due<today;
        const dv=t.due?dl(t.due):null;
        const soon=!late&&dv!==null&&dv<=7&&dv>=0;
        h+=`<div class="ms-task ${t.done?'done':''}" data-action="open-task" data-id="${t.id}">
          <button class="chk ${t.done?'done':''}" data-action="tog-task" data-id="${t.id}">
            <span class="chk-ico"><svg viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </button>
          <div class="ms-task-info">
            <div class="ms-task-title">${t.title}</div>
            <div class="ms-task-meta">
              ${names?`<span class="chip per" style="font-size:11px;padding:2px 7px">${names}</span>`:''}
              <span class="pdot ${t.prio}" style="width:7px;height:7px;display:inline-block;border-radius:50%;vertical-align:middle"></span>
              ${vnd?`<span class="chip vendor" style="font-size:11px;padding:2px 7px">${vnd.name}</span>`:''}
              ${t.costActual?`<span class="chip cost" style="font-size:11px;padding:2px 7px">${eur(t.costActual)}</span>`:''}
              ${t.due?`<span class="chip due ${late?'late':soon?'soon':''}" style="font-size:11px;padding:2px 4px">${fmt(t.due)}</span>`:''}
            </div>
          </div>
        </div>`;
      });
    } else {
      h+=`<div style="font-size:13px;color:var(--t3);padding:8px 0;font-style:italic">Keine Aufgaben in dieser Phase</div>`;
    }
    h+=`</div>
        <div class="ms-actions">
          <button class="ms-add-btn" onclick="window.openAddModalWithDate('${midDateStr}')">+ Aufgabe</button>
          ${relevantTpls.length?`<button class="ms-add-btn ms-tpl-btn" onclick="window.openTplForPhase(${i})">+ Aus Vorlage</button>`:''}
        </div>
      </div>
    </div>`;
  });
  // Unplanned section
  if(unplanned.length){
    h+=`<div class="ms-card ms-unplanned">
      <div class="ms-timeline-dot future"></div>
      <div class="ms-content">
        <div class="ms-header">
          <div class="ms-label">Ungeplant</div>
          <div class="ms-date-range">Diese Aufgaben haben kein Fälligkeitsdatum</div>
        </div>
        <div class="ms-tasks">`;
    unplanned.forEach(t=>{
      const names=(t.assignees||[]).join(', ');
      const vnd=t.vendorId?vendors.find(v=>v.id===t.vendorId):null;
      h+=`<div class="ms-task ${t.done?'done':''}" data-action="open-task" data-id="${t.id}">
        <button class="chk ${t.done?'done':''}" data-action="tog-task" data-id="${t.id}">
          <span class="chk-ico"><svg viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </button>
        <div class="ms-task-info">
          <div class="ms-task-title">${t.title}</div>
          <div class="ms-task-meta">
            ${names?`<span class="chip per" style="font-size:11px;padding:2px 7px">${names}</span>`:''}
            <span class="pdot ${t.prio}" style="width:7px;height:7px;display:inline-block;border-radius:50%;vertical-align:middle"></span>
            ${vnd?`<span class="chip vendor" style="font-size:11px;padding:2px 7px">${vnd.name}</span>`:''}
            ${t.costActual?`<span class="chip cost" style="font-size:11px;padding:2px 7px">${eur(t.costActual)}</span>`:''}
          </div>
        </div>
      </div>`;
    });
    h+=`</div></div></div>`;
  }
  a.innerHTML=h;
}

// addTpl: add tasks from a template
window.addTpl=async function(tplId){
  const tpl=TPLS.find(t=>t.id===tplId);if(!tpl)return;
  if(tmpls.includes(tplId))return;
  const catMap={loc:'Location',cat:'Catering',foto:'Fotografie',deko:'Dekoration',mus:'Musik',kld:'Kleidung',inv:'Einladungen',flh:'Flitterwochen',org:'Sonstiges',bty:'Sonstiges',std:'Sonstiges'};
  const cat=catMap[tplId]||'Sonstiges';
  // Spread due dates within a relevant timeframe based on wedding date
  const wd2=wDate?new Date(wDate):null;
  tpl.ts.forEach((title,idx)=>{
    let due='';
    if(wd2){
      const offset=new Date(wd2);
      // Spread tasks over several months before wedding
      const monthsBefore=Math.max(1,Math.floor((tpl.ts.length-idx)/tpl.ts.length*10));
      offset.setMonth(offset.getMonth()-monthsBefore);
      offset.setDate(offset.getDate()+idx*3);
      due=offset.toISOString().split('T')[0];
    }
    tasks.push({id:nid++,title,assignees:[],cat,prio:'mittel',due,done:false,comments:[],costActual:0,trashed:false});
  });
  tmpls.push(tplId);
  await save();render();
};

// Vorlagen overlay for Aufgaben tab
window._vorlagenView='grid'; // 'grid' or 'detail'
window._vorlagenTplId=null;
window.openVorlagenOverlay=function(tplId){
  let ol=document.getElementById('vorlagen-overlay');
  if(!ol){
    ol=document.createElement('div');ol.id='vorlagen-overlay';ol.className='overlay';ol.style.zIndex='503';
    ol.innerHTML=`<div class="sheet" style="max-width:500px"><div class="sh-handle"></div><div id="vorlagen-content"></div></div>`;
    document.body.appendChild(ol);

  }
  if(tplId){window._vorlagenView='detail';window._vorlagenTplId=tplId;}
  else{window._vorlagenView='grid';window._vorlagenTplId=null;}
  renderVorlagenContent();
  ol.classList.add('open');
};

window.renderVorlagenContent=function(){
  const cont=document.getElementById('vorlagen-content');if(!cont)return;
  if(window._vorlagenView==='detail'&&window._vorlagenTplId){
    const tpl=TPLS.find(t=>t.id===window._vorlagenTplId);if(!tpl){window._vorlagenView='grid';renderVorlagenContent();return;}
    // Find which tasks already exist
    const existingTitles=new Set(tasks.filter(t=>!t.trashed).map(t=>t.title.toLowerCase()));
    let h=`<button class="tpl-detail-back" onclick="window._vorlagenView='grid';renderVorlagenContent()">← Zurück</button>`;
    h+=`<div class="tpl-detail-header"><div class="tpl-ico">${tpl.ico}</div><div><div class="tpl-name">${tpl.name}</div><div class="tpl-cnt">${tpl.ts.length} Aufgaben verfügbar</div></div></div>`;
    h+=`<div class="tpl-select-bar"><button onclick="toggleAllTpl(true)">Alle auswählen</button><button onclick="toggleAllTpl(false)">Keine auswählen</button></div>`;
    h+=`<div class="tpl-task-list">`;
    tpl.ts.forEach((title,i)=>{
      const exists=existingTitles.has(title.toLowerCase());
      h+=`<div class="tpl-task-item ${exists?'already-added':''}">
        <input type="checkbox" id="tpl-cb-${i}" data-tpl-idx="${i}" ${exists?'disabled':'checked'} class="tpl-task-cb"/>
        <label for="tpl-cb-${i}">${title}${exists?' (bereits vorhanden)':''}</label>
      </div>`;
    });
    h+=`</div>`;
    h+=`<button class="tpl-add-selected" onclick="addSelectedTplTasks('${tpl.id}')">Ausgewählte hinzufügen</button>`;
    h+=`<button class="btn-ghost" style="width:100%;margin-top:8px" onclick="document.getElementById('vorlagen-overlay').classList.remove('open')">Schließen</button>`;
    cont.innerHTML=h;
    updateTplAddBtn();
  } else {
    let h=`<h2 style="font-size:20px;font-weight:700;margin-bottom:6px">📋 Vorlagen</h2>`;
    h+=`<p style="font-size:13px;color:var(--t2);margin-bottom:14px">Wähle eine Kategorie und dann die einzelnen Aufgaben, die du übernehmen möchtest.</p>`;
    h+=`<div class="tpl-grid">`;
    TPLS.forEach(tpl=>{
      const addedCount=tpl.ts.filter(t=>tasks.some(x=>!x.trashed&&x.title.toLowerCase()===t.toLowerCase())).length;
      const allAdded=addedCount===tpl.ts.length;
      h+=`<button class="tpl-card ${allAdded?'added':''}" onclick="window._vorlagenView='detail';window._vorlagenTplId='${tpl.id}';renderVorlagenContent()">
        <div class="tpl-ico">${tpl.ico}</div>
        <div class="tpl-name">${tpl.name}</div>
        <div class="tpl-cnt">${allAdded?'✓ Alle übernommen':addedCount>0?addedCount+'/'+tpl.ts.length+' übernommen':tpl.ts.length+' Aufgaben'}</div>
      </button>`;
    });
    h+=`</div>`;
    h+=`<button class="btn-ghost" style="width:100%;margin-top:8px" onclick="document.getElementById('vorlagen-overlay').classList.remove('open')">Schließen</button>`;
    cont.innerHTML=h;
  }
}

window.toggleAllTpl=function(state){
  document.querySelectorAll('.tpl-task-cb:not(:disabled)').forEach(cb=>{cb.checked=state;});
  updateTplAddBtn();
};

function updateTplAddBtn(){
  const btn=document.querySelector('.tpl-add-selected');if(!btn)return;
  const checked=document.querySelectorAll('.tpl-task-cb:checked:not(:disabled)').length;
  btn.disabled=checked===0;
  btn.textContent=checked===0?'Keine Aufgaben ausgewählt':checked+' Aufgabe'+(checked>1?'n':'')+' hinzufügen';
}

// Listen for checkbox changes to update button
document.addEventListener('change',function(e){

window.addSelectedTplTasks=async function(tplId){
  const tpl=TPLS.find(t=>t.id===tplId);if(!tpl)return;
  const catMap={loc:'Location',cat:'Catering',foto:'Fotografie',deko:'Dekoration',mus:'Musik',kld:'Kleidung',inv:'Einladungen',flh:'Flitterwochen',org:'Sonstiges',bty:'Sonstiges',std:'Sonstiges'};
  const cat=catMap[tplId]||'Sonstiges';
  const cbs=document.querySelectorAll('.tpl-task-cb:checked:not(:disabled)');
  if(!cbs.length)return;
  const wd2=wDate?new Date(wDate):null;
  const indices=Array.from(cbs).map(cb=>parseInt(cb.dataset.tplIdx));
  indices.forEach((idx,i)=>{
    const title=tpl.ts[idx];if(!title)return;
    let due='';
    if(wd2){
      const offset=new Date(wd2);
      const monthsBefore=Math.max(1,Math.floor((tpl.ts.length-idx)/tpl.ts.length*10));
      offset.setMonth(offset.getMonth()-monthsBefore);
      offset.setDate(offset.getDate()+i*3);
      due=offset.toISOString().split('T')[0];
    }
    tasks.push({id:nid++,title,assignees:[],cat,prio:'mittel',due,done:false,comments:[],costActual:0,trashed:false});
  });
  if(!tmpls.includes(tplId))tmpls.push(tplId);
  await save();render();
  renderVorlagenContent();
};
